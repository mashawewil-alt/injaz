<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>تطبيق إنجاز - النسخة الأسطورية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Cairo:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#11151b;
    --bg-2:#161c24;
    --card:#1c232c;
    --card-hover:#212a34;
    --border:#2a3340;
    --text:#e9edf3;
    --text-dim:#8d99a8;
    --text-dimmer:#5f6b7a;
    --accent:#e3ac67;
    --accent-soft:#e3ac6722;
    --teal:#57c3ab;
    --teal-soft:#57c3ab22;
    --good:#5fb686;
    --good-soft:#5fb68622;
    --bad:#d9695e;
    --bad-soft:#d9695e22;
    --radius:16px;
    --radius-sm:10px;
    --shadow: 0 8px 28px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(1200px 800px at 85% -10%, #1a2028 0%, var(--bg) 45%) fixed;
    color:var(--text);
    font-family:'Tajawal',sans-serif;
    min-height:100vh;
    padding-bottom:60px;
  }
  h1,h2,h3,.display{font-family:'Cairo',sans-serif;}
  ::selection{background:var(--accent-soft);}
  .wrap{max-width:640px;margin:0 auto;padding:18px 16px 40px;}

  /* Header */
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px;}
  .date-block .greeting{color:var(--text-dim);font-size:13px;margin-bottom:2px;}
  .date-block .day{font-family:'Cairo',sans-serif;font-weight:800;font-size:22px;}
  .date-block .full-date{color:var(--text-dim);font-size:12.5px;margin-top:2px;}
  .stats-pill{display:flex;align-items:center;gap:10px;}
  .pill{background:var(--card);border:1px solid var(--border);border-radius:999px;padding:8px 14px;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;box-shadow:var(--shadow);}
  .pill .num{font-family:'Cairo',sans-serif;color:var(--accent);}
  .pill.streak .num{color:var(--teal);}

  /* AI Insight Card */
  .ai-card{background:linear-gradient(135deg, #1c2536, #171e2b);border:1px solid #3b4a6b;border-radius:var(--radius);padding:16px;margin-bottom:16px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
  .ai-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle, #57c3ab11 0%, transparent 60%);pointer-events:none;}
  .ai-header{display:flex;align-items:center;gap:8px;font-family:'Cairo',sans-serif;font-weight:800;font-size:14.5px;color:var(--teal);margin-bottom:6px;}

  /* Plant Card */
  .plant-card{background:linear-gradient(180deg,var(--card),var(--bg-2));border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:16px;box-shadow:var(--shadow);}
  .plant-svg{flex:0 0 auto;width:64px;height:64px;}
  .plant-info{flex:1;}
  .plant-info .label{font-size:12.5px;color:var(--text-dim);margin-bottom:3px;}
  .plant-info .level-name{font-family:'Cairo',sans-serif;font-weight:800;font-size:16px;color:var(--text);}
  .progress-track{margin-top:8px;height:7px;background:var(--bg);border-radius:99px;overflow:hidden;border:1px solid var(--border);}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--accent));border-radius:99px;transition:width .5s ease;}
  .progress-label{font-size:11px;color:var(--text-dimmer);margin-top:5px;}

  /* Pomodoro Timer */
  .timer-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;text-align:center;box-shadow:var(--shadow);}
  .timer-display{font-family:'Cairo',sans-serif;font-size:34px;font-weight:800;color:var(--accent);margin:6px 0;}

  /* Section Headers */
  .sec-head{display:flex;align-items:center;justify-content:space-between;margin:22px 0 10px;}
  .sec-head h2{font-size:15px;margin:0;color:var(--text-dim);font-weight:800;letter-spacing:.3px;}
  .add-btn{background:var(--accent-soft);color:var(--accent);border:1px solid #e3ac6744;border-radius:10px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Tajawal';}
  .add-btn:hover{background:#e3ac6733;}

  /* Notifications Toggle Button */
  .noti-btn{background:var(--teal-soft);color:var(--teal);border:1px solid #57c3ab44;}

  /* Task Card */
  .task{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:9px;display:flex;align-items:center;gap:12px;transition:.25s;position:relative;}
  .task.done{background:var(--good-soft);border-color:#5fb68655;}
  .task.missed{background:var(--bad-soft);border-color:#d9695e55;}
  .check-btn{flex:0 0 auto;width:30px;height:30px;border-radius:9px;border:2px solid var(--text-dimmer);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;background:transparent;color:transparent;font-size:16px;}
  .task.done .check-btn{background:var(--good);border-color:var(--good);color:#0d1a12;}
  .task-body{flex:1;min-width:0;}
  .task-title{font-size:14.5px;font-weight:700;}
  .task.done .task-title{text-decoration:line-through;text-decoration-color:#5fb68699;opacity:.75;}
  .task-tag{font-size:11px;color:var(--text-dimmer);margin-top:2px;}
  .task-msg{font-size:12px;margin-top:5px;line-height:1.6;}
  .task.done .task-msg{color:#8fdcab;}
  .task.missed .task-msg{color:#f0a89f;}
  .task-actions{display:flex;gap:6px;}
  .icon-btn{background:transparent;border:none;color:var(--text-dimmer);cursor:pointer;font-size:14px;padding:4px;}
  .icon-btn:hover{color:var(--text);}
  .x-btn{flex:0 0 auto;width:30px;height:30px;border-radius:9px;border:2px solid var(--text-dimmer);display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;color:var(--text-dimmer);font-size:14px;}
  .x-btn:hover{border-color:var(--bad);color:var(--bad);}
  .task.missed .x-btn{background:var(--bad);border-color:var(--bad);color:#210c0a;}

  .empty{text-align:center;color:var(--text-dimmer);font-size:13.5px;padding:26px 10px;border:1.5px dashed var(--border);border-radius:var(--radius);}

  /* Forms */
  .form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
  .form-row{display:flex;gap:8px;margin-bottom:10px;}
  input[type=text]{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--text);font-family:'Tajawal';font-size:14px;}
  input[type=text]:focus{outline:none;border-color:var(--accent);}
  .seg{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .seg button{flex:1;padding:9px 10px;background:transparent;border:none;color:var(--text-dim);font-family:'Tajawal';font-size:12.5px;font-weight:700;cursor:pointer;}
  .seg button.active{background:var(--accent);color:#221607;}
  .primary-btn{width:100%;background:var(--accent);color:#221607;border:none;border-radius:10px;padding:11px;font-weight:800;font-size:14px;cursor:pointer;font-family:'Cairo';}
  .ghost-btn{width:100%;background:transparent;color:var(--text-dim);border:1px solid var(--border);border-radius:10px;padding:9px;font-size:13px;cursor:pointer;margin-top:6px;font-family:'Tajawal';}

  /* Shop Grid */
  .shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .box-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 10px;text-align:center;cursor:pointer;transition:.2s;}
  .box-card:hover{transform:translateY(-2px);border-color:var(--accent);}
  .box-card.disabled{opacity:.4;cursor:not-allowed;}
  .box-emoji{font-size:26px;margin-bottom:6px;}
  .box-name{font-size:12.5px;font-weight:700;}
  .box-cost{font-size:11.5px;color:var(--accent);margin-top:3px;font-weight:700;}

  /* Overlays / Modals */
  .overlay{position:fixed;inset:0;background:rgba(8,10,13,.86);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:var(--card-hover);border:1px solid var(--border);border-radius:20px;padding:26px 22px;max-width:420px;width:100%;box-shadow:var(--shadow);max-height:85vh;overflow-y:auto;text-align:center;}
  .modal h3{margin:0 0 12px;font-size:19px;}
  .modal p{line-height:1.9;font-size:14.5px;color:#dbe2ea;margin:0 0 10px;}
  .modal .tip{background:var(--teal-soft);border:1px solid #57c3ab44;border-radius:12px;padding:10px 12px;font-size:13px;color:#a8ebdb;margin-top:12px;text-align:right;}
  .modal .close-btn{margin-top:18px;}

  /* Inside App Toast System */
  .toast-container {position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;display:flex;flex-direction:column;gap:10px;width:90%;max-width:400px;pointer-events:none;}
  .toast-box {background:var(--card);border:2px solid var(--teal);box-shadow:var(--shadow);padding:12px 16px;border-radius:12px;color:var(--text);font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:10px;pointer-events:auto;animation:slideDown 0.4s ease forwards;}
  @keyframes slideDown{from{transform:translateY(-40px);opacity:0;}to{transform:translateY(0);opacity:1;}}

  .badges-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-top:6px;}
  .badge-chip{flex:0 0 auto;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:6px 10px;font-size:11px;color:var(--text-dim);white-space:nowrap;}
  .badge-chip.reached{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}

  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>
<div class="wrap" id="app"></div>

<script>
(function(){

/* ================= DATA POOLS ================= */
const DONE_TEMPLATES = ["أحسنت، خطوة صغيرة اليوم تُبنى منها عادة كبيرة.","تمّت! كذا بالضبط تُبنى الثقة بالنفس، خطوة بخطوة.","ما شاء الله، الالتزام يبدأ من لحظات بسيطة مثل هذي.","سجّلتها إنجاز. استمر على نفس الوتيرة."];
const DONE_FILLERS = ["استمر بنفس الروح 🌿","خطوة بخطوة توصل 🌱","الاتساق أهم من الكمال ✨"];
const MISS_TEMPLATES = ["ما صار اليوم، ولا بأس، بكرة فرصة جديدة تعوّض فيها.","فاتتك هالمرة، المهم ما تخليها تتكرر بكرة."];
const MISS_FILLERS = ["بكرة نبدأ من جديد 🌤️","التعثر جزء من الطريق 🍂"];
const CELEBRATE_OPENERS = ["يوم كامل! أنجزت كل شي حطيته على نفسك، وهذا مو بسيط أبدًا.","ما شاء الله عليك, خلّصت مهام اليوم كاملة من غير ما تتنازل."];
const CELEBRATE_BODY = ["تذكر إن كل يوم كذا يضيف طوبة جديدة لبناء أكبر تسويه بصبر.","الفرق بين اللي يوصل واللي يتوقف هو الاستمرار بعد يوم زي اليوم."];
const CELEBRATE_SUGGESTIONS = ["وش رايك تخصص ١٥ دقيقة تتعلم فيها شي جديد بمجال يهمك؟","استغل الوقت المتبقي بقراءة كم صفحة من كتاب كنت ناوي تبدأه."];
const REWARD_OPENERS = ["فتحت الصندوق ولقيت بداخله...","هذا اللي كان مخبّى لك اليوم:"];
const REWARD_QUOTES = ["الطريق الطويل يبدأ بخطوة، لكنه يكتمل بخطوات لا تتوقف.","الانضباط هو الجسر بين ما تحلم فيه وما تحققه فعلاً."];
const REWARD_TIPS = ["معلومة: الدماغ يحتاج تقريبًا ٦٦ يوم بالمتوسط عشان يثبّت سلوك كعادة تلقائية.","جرّب تقنية 'دقيقتين': أي مهمة تاخذ أقل من دقيقتين سوّها فورًا."];

const LEVELS = [
  {name:"بداية الطريق", min:0},{name:"أول التزام", min:50},{name:"مثابر صغير", min:120},
  {name:"منضبط ناشئ", min:220},{name:"صاحب عادة", min:350},{name:"ثابت الخطى", min:500}
];

const SHOP_BOXES = [
  {id:'small', name:'صندوق بسيط', emoji:'🎁', cost:30},
  {id:'medium', name:'صندوق مميز', emoji:'🎀', cost:70},
  {id:'large', name:'صندوق ذهبي', emoji:'🏆', cost:150}
];

const GOAL_TYPES = {
  weekly:{label:'أسبوعي', bonus:30},
  monthly:{label:'شهري', bonus:100},
  yearly:{label:'سنوي', bonus:400}
};

const AR_DAYS = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
const AR_MONTHS = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];

/* ================= STORAGE CORES ================= */
function sGet(key){ try{ const r = localStorage.getItem('dailyapp:'+key); return r?JSON.parse(r):null; }catch(e){return null;} }
function sSet(key,val){ try{ localStorage.setItem('dailyapp:'+key,JSON.stringify(val)); }catch(e){} }

function todayStr(){ const d = new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtFullDate(d=new Date()){ return `${d.getDate()} ${AR_MONTHS[d.getMonth()]} ${d.getFullYear()}`; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

/* ================= NOTIFICATION ENGINES ================= */
window.NotificationSystem = {
  request(){
    if('Notification' in window){
      Notification.requestPermission().then(perm => {
        if(perm === 'granted') {
          NotificationSystem.toast("🔔 تم تفعيل الإشعارات الخارجية بنجاح!");
          new Notification("تطبيق إنجاز", { body: "مرحباً بك! الإشعارات الخارجية ستصلك هنا فوراً عند الإنجاز والتركيز." });
        }
      });
    } else {
      NotificationSystem.toast("❌ متصفحك لا يدعم الإشعارات الخارجية.");
    }
  },
  toast(msg){
    const container = document.getElementById('toastContainer');
    if(!container) return;
    const box = document.createElement('div');
    box.className = 'toast-box';
    box.innerHTML = `⚡ <span>${msg}</span>`;
    container.appendChild(box);
    setTimeout(()=> box.remove(), 4000);
  },
  sendExternal(title, body){
    if('Notification' in window && Notification.permission === 'granted'){
      new Notification(title, { body });
    }
  }
};

/* ================= STATE & LOGIC ================= */
let STATE = {
  tasks: [], goals: [], skills: [],
  stats: {points:0, streakCurrent:0, streakLongest:0, lastActiveDate:null},
  day: null,
  ui: {showAddForm:false, addType:'routine', showAddGoal:false, goalType:'weekly', showAddSkill:false, showCelebration:null, showReward:null, welcomeShown:false}
};

let PomodoroState = { secondsLeft: 1500, interval: null, running: false };

async function loadAll(){
  STATE.tasks = sGet('tasks') || [];
  STATE.goals = sGet('goals') || [];
  STATE.skills = sGet('skills') || [];
  STATE.stats = sGet('stats') || {points:0, streakCurrent:0, streakLongest:0, lastActiveDate:null};
  
  const t = todayStr();
  let rec = sGet('day:'+t);
  if(!rec) rec = {date:t, statuses:{}, celebrationShown:false};
  STATE.day = rec;

  if(STATE.stats.lastActiveDate && STATE.stats.lastActiveDate !== t){
    const diff = Math.round((new Date(t) - new Date(STATE.stats.lastActiveDate))/86400000);
    if(diff > 1) STATE.stats.streakCurrent = 0;
    STATE.stats.lastActiveDate = t;
    sSet('stats', STATE.stats);
  } else if(!STATE.stats.lastActiveDate){
    STATE.stats.lastActiveDate = t;
    sSet('stats', STATE.stats);
  }

  if(!sessionStorage.getItem('welcome_done')){
    setTimeout(() => {
      STATE.ui.welcomeShown = true;
      sessionStorage.setItem('welcome_done', 'true');
      render();
    }, 600);
  }
}

function tasksForDate(dateStr){ return STATE.tasks.filter(t=> t.type==='routine' || t.date===dateStr); }
function currentLevel(){
  let lvl = LEVELS[0], idx=0;
  for(let i=0;i<LEVELS.length;i++){ if(STATE.stats.points>=LEVELS[i].min){ lvl=LEVELS[i]; idx=i; } }
  return {lvl, next: LEVELS[idx+1]};
}

function generateAIInsight(){
  const list = tasksForDate(todayStr());
  const done = list.filter(tk=>STATE.day.statuses[tk.id]==='done').length;
  const skillCount = STATE.skills.length;
  
  if(list.length === 0){
    return "🤖 <b>تحليل الذكاء الاصطناعي:</b> جدولك فارغ اليوم يا صديقي! نقترح عليك إضافة مهمة واحدة على الأقل أو هدف أسبوعي لبناء زخم إنجاز قوي للغد.";
  }
  if(done === list.length && list.length > 0){
    return "🤖 <b>تحليل الذكاء الاصطناعي:</b> أداء أسطوري ومثالي اليوم! نقاط طاقة نبتتك ترتفع. نقترح عليك استغلال وقت الفراغ بزيادة ساعة عمل في مهاراتك الفعالة.";
  }
  if(skillCount > 0){
    const topSkill = STATE.skills[0];
    return `🤖 <b>تحليل الذكاء الاصطناعي:</b> نلاحظ تركيزك على مهارة (${topSkill.title}). نقترح عليك تشغيل مؤقت البومودورو الآن لمدة 25 دقيقة لتدريبها وتجميع +40 نقطة فورية!`;
  }
  return "🤖 <b>تحليل الذكاء الاصطناعي:</b> رائع! ركّز على إنهاء مهامك الحالية أولاً بأول، وتذكر أن الالتزام اليومي البسيط هو سر صناعة المجد الشخصي الكبيير.";
}

/* ================= ACTIONS ================= */
window.UI = {
  toggleAdd(){ STATE.ui.showAddForm = !STATE.ui.showAddForm; render(); },
  setAddType(v){ STATE.ui.addType=v; render(); },
  submitAdd(){
    const inp = document.getElementById('newTaskInput');
    if(!inp || !inp.value.trim()) return;
    STATE.tasks.push({id:uid(), title:inp.value.trim(), type:STATE.ui.addType, date: STATE.ui.addType==='once'?todayStr():null});
    sSet('tasks', STATE.tasks);
    STATE.ui.showAddForm=false;
    NotificationSystem.toast("✅ تم إضافة المهمة بنجاح!");
    render();
  },
  async toggle(id){
    const rec = STATE.day;
    if(rec.statuses[id]==='done'){
      delete rec.statuses[id];
      STATE.stats.points = Math.max(0, STATE.stats.points-10);
    } else {
      rec.statuses[id]='done';
      STATE.stats.points += 10;
      NotificationSystem.toast("🎉 أحسنت! كسبت +10 نقاط طاقة.");
      NotificationSystem.sendExternal("مهمة منجزة! 🔥", "استمر يا بطل، خطوة إضافية للامام.");
    }
    sSet('day:'+todayStr(), rec);
    sSet('stats', STATE.stats);
    
    const list = tasksForDate(todayStr());
    if(list.length>0 && list.every(tk=>rec.statuses[tk.id]==='done') && !rec.celebrationShown){
      STATE.stats.points += 50;
      STATE.stats.streakCurrent += 1;
      rec.celebrationShown = true;
      sSet('day:'+todayStr(), rec);
      sSet('stats', STATE.stats);
      STATE.ui.showCelebration = {title:"🔥 يوم مثالي أسطوري!", body:"أكملت جميع مهام اليوم بدون أي تراجع، كسبت +50 نقطة إضافية وسلسلتك كبرت!", tip:"استغل هذا الإنجاز لترتيب أهداف الأسبوع الجاي بحماس."};
      NotificationSystem.sendExternal("🎉 إنجاز كامل لليوم!", "لقده أنهيت كل مهامك اليوم بنجاح خارق.");
    }
    render();
  },
  miss(id){
    const rec = STATE.day;
    rec.statuses[id] = rec.statuses[id]==='missed' ? undefined : 'missed';
    sSet('day:'+todayStr(), rec);
    render();
  },
  remove(id){
    STATE.tasks = STATE.tasks.filter(t=>t.id!==id);
    sSet('tasks', STATE.tasks);
    render();
  },
  toggleAddGoal(){ STATE.ui.showAddGoal = !STATE.ui.showAddGoal; render(); },
  setGoalType(v){ STATE.ui.goalType=v; render(); },
  submitGoal(){
    const inp = document.getElementById('newGoalInput');
    if(!inp || !inp.value.trim()) return;
    const d = new Date();
    if(STATE.ui.goalType==='weekly') d.setDate(d.getDate()+7);
    else if(STATE.ui.goalType==='monthly') d.setMonth(d.getMonth()+1);
    else d.setFullYear(d.getFullYear()+1);
    
    STATE.goals.push({id:uid(), text:inp.value.trim(), type:STATE.ui.goalType, deadline: d.toISOString().split('T')[0], status:'pending'});
    sSet('goals', STATE.goals);
    STATE.ui.showAddGoal=false;
    NotificationSystem.toast("🎯 تم تثبيت الهدف بنجاح!");
    render();
  },
  reviewGoal(id, success){
    const g = STATE.goals.find(x=>x.id===id);
    if(!g) return;
    if(success){
      g.status = 'done';
      STATE.stats.points += GOAL_TYPES[g.type].bonus;
      NotificationSystem.toast(`🔥 هدف محقق! مبروك رصيد الـ +${GOAL_TYPES[g.type].bonus} نقطة.`);
    } else {
      g.status = 'failed';
    }
    sSet('goals', STATE.goals);
    sSet('stats', STATE.stats);
    render();
  },
  removeGoal(id){ STATE.goals = STATE.goals.filter(x=>x.id!==id); sSet('goals', STATE.goals); render(); },
  
  toggleAddSkill(){ STATE.ui.showAddSkill = !STATE.ui.showAddSkill; render(); },
  submitAddSkill(){
    const inp = document.getElementById('newSkillInput');
    if(!inp || !inp.value.trim()) return;
    STATE.skills.push({id:uid(), title:inp.value.trim(), hours:0});
    sSet('skills', STATE.skills);
    STATE.ui.showAddSkill=false;
    render();
  },
  addSkillHour(id){
    const s = STATE.skills.find(x=>x.id===id);
    if(s){
      s.hours++;
      STATE.stats.points += 20;
      sSet('skills', STATE.skills);
      sSet('stats', STATE.stats);
      NotificationSystem.toast(`🧠 أحسنت التدريب الفعلي! +20 نقطة طاقة لمهارة ${s.title}`);
      render();
    }
  },
  removeSkill(id){ STATE.skills = STATE.skills.filter(x=>x.id!==id); sSet('skills', STATE.skills); render(); },

  togglePomodoro(){
    if(PomodoroState.running){
      clearInterval(PomodoroState.interval);
      PomodoroState.running = false;
    } else {
      PomodoroState.running = true;
      PomodoroState.interval = setInterval(() => {
        if(PomodoroState.secondsLeft > 0){
          PomodoroState.secondsLeft--;
          const m = Math.floor(PomodoroState.secondsLeft / 60).toString().padStart(2,'0');
          const s = (PomodoroState.secondsLeft % 60).toString().padStart(2,'0');
          const disp = document.getElementById('pomodoro-display');
          if(disp) disp.innerText = `${m}:${s}`;
        } else {
          clearInterval(PomodoroState.interval);
          PomodoroState.running = false;
          PomodoroState.secondsLeft = 1500;
          STATE.stats.points += 40;
          sSet('stats', STATE.stats);
          NotificationSystem.toast("⏱️ كفو! انتهت جلسة التركيز كاملة، كسبت +40 نقطة 🎉");
          NotificationSystem.sendExternal("انتهى مؤقت بومودورو ⏱️", "كفو عليك! أنهيت 25 دقيقة تركيز بنجاح وكسبت +40 نقطة.");
          render();
        }
      }, 1000);
    }
    render();
  },
  resetPomodoro(){
    clearInterval(PomodoroState.interval);
    PomodoroState.running = false;
    PomodoroState.secondsLeft = 1500;
    render();
  },

  buy(id){
    const b = SHOP_BOXES.find(x=>x.id===id);
    if(!b || STATE.stats.points < b.cost) return;
    STATE.stats.points -= b.cost;
    sSet('stats', STATE.stats);
    STATE.ui.showReward = {opener:"🎁 فتحت الصندوق ووجدت فيه هديتك الروحية:", quote: REWARD_QUOTES[Math.floor(Math.random()*REWARD_QUOTES.length)], tip: REWARD_TIPS[Math.floor(Math.random()*REWARD_TIPS.length)]};
    render();
  }
};

/* ================= RENDER INTERFACES ================= */
function plantSvg(streak){
  const leaves = Math.min(6, Math.floor(streak/2));
  let paths = '';
  const pos = [[32,40,-20],[32,32,20],[32,24,-15],[32,16,15],[32,10,-10],[32,4,10]];
  for(let i=0;i<leaves;i++){
    paths += `<ellipse cx="${pos[i][0]}" cy="${pos[i][1]}" rx="7" ry="4" fill="#57c3ab" transform="rotate(${pos[i][2]} ${pos[i][0]} ${pos[i][1]})"/>`;
  }
  return `<svg class="plant-svg" viewBox="0 0 64 64"><rect x="14" y="46" width="36" height="10" rx="3" fill="#2a3340"/><path d="M32 46 L32 12" stroke="#57c3ab" stroke-width="3"/><th/>${paths}</svg>`;
}

function render(){
  const t = todayStr();
  const now = new Date();
  const list = tasksForDate(t);
  const rec = STATE.day;
  const {lvl, next} = currentLevel();
  const progressPct = next? Math.min(100, Math.round(((STATE.stats.points-lvl.min)/(next.min-lvl.min))*100)) : 100;

  let html = '';

  // Top Bar
  html += `<div class="top">
    <div class="date-block">
      <div class="greeting">أهلاً بك في تطبيق إنجاز 👋</div>
      <div class="day">يوم ${AR_DAYS[now.getDay()]}</div>
      <div class="full-date">${fmtFullDate(now)}</div>
    </div>
    <div class="stats-pill">
      <div class="pill streak">🔥 <span class="num">${STATE.stats.streakCurrent}</span></div>
      <div class="pill points">⭐ <span class="num">${STATE.stats.points}</span></div>
    </div>
  </div>`;

  // AI Insights Box
  html += `<div class="ai-card">
    <div class="ai-header">🤖 مستشار الـ AI لتطبيق إنجاز</div>
    <div style="font-size:13px; line-height:1.7; color:var(--text);">${generateAIInsight()}</div>
  </div>`;

  // Plant Card
  html += `<div class="plant-card">
    ${plantSvg(STATE.stats.streakCurrent)}
    <div class="plant-info">
      <div class="label">مستواك الحالي في الانضباط</div>
      <div class="level-name">${lvl.name}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${progressPct}%"></div></div>
      <div class="progress-label">${next? `${STATE.stats.points} / ${next.min} نقطة للمستوى التالي` : 'أعلى قمة مستويات الطاقة 👑'}</div>
    </div>
  </div>`;

  // Pomodoro
  const pm = Math.floor(PomodoroState.secondsLeft/60).toString().padStart(2,'0');
  const ps = (PomodoroState.secondsLeft%60).toString().padStart(2,'0');
  html += `<div class="timer-card">
    <div style="font-size:12.5px; color:var(--text-dim); font-weight:700; margin-bottom:4px;">⏱️ بومودورو التركيز والإنتاجية العالية (+40 نقطة)</div>
    <div class="timer-display" id="pomodoro-display">${pm}:${ps}</div>
    <div style="display:flex; gap:6px; justify-content:center;">
      <button class="add-btn" onclick="UI.togglePomodoro()">${PomodoroState.running?'إيقاف مؤقت ⏸️':'ابدأ التركيز 🚀'}</button>
      <button class="add-btn" style="background:var(--bad-soft); color:var(--bad); border-color:#d9695e44;" onclick="UI.resetPomodoro()">إعادة تعيين</button>
    </div>
  </div>`;

  // Tasks System
  html += `<div class="sec-head">
    <h2>قائمة مهام اليوم (${list.filter(k=>rec.statuses[k.id]==='done').length}/${list.length})</h2>
    <div style="display:flex; gap:6px;">
      <button class="add-btn noti-btn" onclick="NotificationSystem.request()">🔔 تفعيل الإشعارات الخارجية</button>
      <button class="add-btn" onclick="UI.toggleAdd()">+ إضافة مهمة</button>
    </div>
  </div>`;

  if(STATE.ui.showAddForm){
    html += `<div class="form-card">
      <div class="form-row"><input type="text" id="newTaskInput" placeholder="اكتب المهمة هنا..." /></div>
      <div class="form-row"><div class="seg">
        <button class="${STATE.ui.addType==='routine'?'active':''}" onclick="UI.setAddType('routine')">روتين دائم</button>
        <button class="${STATE.ui.addType==='once'?'active':''}" onclick="UI.setAddType('once')">اليوم فقط</button>
      </div></div>
      <button class="primary-btn" onclick="UI.submitAdd()">تثبيت الحفظ</button>
    </div>`;
  }

  if(list.length===0){
    html += `<div class="empty">لا توجد مهام حالية لليوم. أضف مهامك لتبدأ تجميع طاقة نبتتك الملتزمة 🌱</div>`;
  } else {
    list.forEach(tk=>{
      const st = rec.statuses[tk.id];
      html += `<div class="task ${st==='done'?'done':st==='missed'?'missed':''}">
        <div class="check-btn" onclick="UI.toggle('${tk.id}')">${st==='done'?'✓':''}</div>
        <div class="task-body">
          <div class="task-title">${tk.title}</div>
          <div class="task-tag">${tk.type==='routine'?'روتين متكرر كل يوم':'مهمة لمرة واحدة'}</div>
        </div>
        <div class="task-actions">
          <div class="x-btn" onclick="UI.miss('${tk.id}')">✕</div>
          <button class="icon-btn" onclick="UI.remove('${tk.id}')">🗑</button>
        </div>
      </div>`;
    });
  }

  // Goals System
  html += `<div class="sec-head"><h2>أهدافي الإستراتيجية 🎯</h2><button class="add-btn" onclick="UI.toggleAddGoal()">+ هدف جديد</button></div>`;
  if(STATE.ui.showAddGoal){
    html += `<div class="form-card">
      <div class="form-row"><input type="text" id="newGoalInput" placeholder="اكتب تفاصيل هدفك الكبير هنا..." /></div>
      <div class="form-row"><div class="seg">
        <button class="${STATE.ui.goalType==='weekly'?'active':''}" onclick="UI.setGoalType('weekly')">أسبوعي</button>
        <button class="${STATE.ui.goalType==='monthly'?'active':''}" onclick="UI.setGoalType('monthly')">شهري</button>
        <button class="${STATE.ui.goalType==='yearly'?'active':''}" onclick="UI.setGoalType('yearly')">سنوي</button>
      </div></div>
      <button class="primary-btn" onclick="UI.submitGoal()">حفظ الهدف</button>
    </div>`;
  }

  if(STATE.goals.length===0){
    html += `<div class="empty">لم تسجل أي أهداف بعد. ضع أهدافك البعيدة لتبقى تحت رادارك 🎯</div>`;
  } else {
    STATE.goals.forEach(g=>{
      const curT = todayStr();
      const isDue = curT >= g.deadline && g.status==='pending';
      html += `<div class="task ${g.status==='done'?'done':''}" style="flex-direction:column; align-items:flex-start; gap:4px;">
        <div style="display:flex; width:100%; justify-content:space-between;">
          <div>
            <div class="task-title">${g.text}</div>
            <div class="task-tag">نوع الهدف: هدف ${GOAL_TYPES[g.type].label} (يستحق: ${g.deadline})</div>
          </div>
          <button class="icon-btn" onclick="UI.removeGoal('${g.id}')">🗑</button>
        </div>
        ${isDue? `<div style="margin-top:6px; display:flex; gap:6px; width:100%;">
          <button class="primary-btn" style="padding:6px;" onclick="UI.reviewGoal('${g.id}', true)">✅ أنجزته</button>
          <button class="ghost-btn" style="padding:6px; margin:0;" onclick="UI.reviewGoal('${g.id}', false)">❌ لم أنجزه</button>
        </div>`:''}
        ${g.status==='done'?`<div class="task-tag" style="color:var(--good)">🎉 تم إنجاز هذا الهدف الملحمي! وبنجاح تام.</div>`:''}
      </div>`;
    });
  }

  // Skills System
  html += `<div class="sec-head"><h2>مسارات اكتساب المهارات والنمو 🧠</h2><button class="add-btn" onclick="UI.toggleAddSkill()">+ مهارة جديدة</button></div>`;
  if(STATE.ui.showAddSkill){
    html += `<div class="form-card">
      <div class="form-row"><input type="text" id="newSkillInput" placeholder="مثال: لغة إنجليزية، صيانة بوردات، برمجة..." /></div>
      <button class="primary-btn" onclick="UI.submitAddSkill()">إدراج المسار</button>
    </div>`;
  }
  if(STATE.skills.length===0){
    html += `<div class="empty">لم تضف مهارات لتتبع ساعات التدريب والتركيز عليها بعد.</div>`;
  } else {
    STATE.skills.forEach(sk=>{
      html += `<div class="task" style="justify-content:space-between;">
        <div>
          <div class="task-title">${sk.title}</div>
          <div class="task-tag">عداد التدريب الفعلي الحقيقي: <span style="color:var(--accent); font-weight:bold;">${sk.hours} ساعة عمل</span></div>
        </div>
        <div style="display:flex; gap:6px; align-items:center;">
          <button class="add-btn" style="background:var(--teal-soft); color:var(--teal); padding:5px 8px; font-size:11.5px;" onclick="UI.addSkillHour('${sk.id}')">+ ساعة تدريب</button>
          <button class="icon-btn" onclick="UI.removeSkill('${sk.id}')">🗑</button>
        </div>
      </div>`;
    });
  }

  // Shop
  html += `<div class="sec-head"><h2>متجر صناديق المكافآت والمفاجآت الروحية 🎁</h2></div><div class="shop-grid">`;
  SHOP_BOXES.forEach(b=>{
    const d = STATE.stats.points < b.cost;
    html += `<div class="box-card ${d?'disabled':''}" onclick="${d?'':`UI.buy('${b.id}')`}">
      <div class="box-emoji">${b.emoji}</div>
      <div class="box-name">${b.name}</div>
      <div class="box-cost">${b.cost} نقطة طاقة</div>
    </div>`;
  });
  html += `</div>`;

  // Footing Levels Bar
  html += `<div class="sec-head"><h2>سجل رتب ومستويات الانضباط الكلي</h2></div><div class="badges-strip">`;
  LEVELS.forEach(l=>{ html += `<div class="badge-chip ${STATE.stats.points>=l.min?'reached':''}">${l.name}</div>`; });
  html += `</div>`;

  // Footer
  html += `<div style="text-align:center; color:var(--text-dimmer); font-size:11.5px; margin-top:40px; padding-top:16px; border-top:1px solid var(--border); line-height:1.7;">
    تطبيق إنجاز المطور بالكامل وتصميمه الهندسي محفوظ للمطور <b>مشعل</b> © 2026<br>
    <span style="background:var(--accent-soft); color:var(--accent); padding:2px 8px; border-radius:4px; font-size:11px; font-weight:bold; display:inline-block; margin-top:4px;">إصدار التحدي الخارق v4.0 • الوعي والانضباط يصنعان المجد 🚀</span>
  </div>`;

  document.getElementById('app').innerHTML = html;

  const oldModal = document.getElementById('modalHost');
  if(oldModal) oldModal.remove();

  if(STATE.ui.welcomeShown && !STATE.ui.showCelebration && !STATE.ui.showReward){
    createModal("👋 مرحباً بك في تطبيق إنجاز!", "جاهز ومستعد لإنجاز تحديات ومهمات جديدة اليوم في تطبيقك المخصص؟ رادارك ونبتتك بانتظار همتك العالية اليوم لرفع النقاط وصناعة الالتزام الأسطوري كالعادة!", "إغلاق النافذة وبدء العمل 🚀", () => { STATE.ui.welcomeShown=false; render(); }, true);
  } else if(STATE.ui.showCelebration){
    createModal("🎉 " + STATE.ui.showCelebration.title, STATE.ui.showCelebration.body, "شكرًا 🤍", () => { STATE.ui.showCelebration=null; render(); }, false, STATE.ui.showCelebration.tip);
  } else if(STATE.ui.showReward){
    createModal(STATE.ui.showReward.opener, `"${STATE.ui.showReward.quote}"`, "إغلاق الصندوق", () => { STATE.ui.showReward=null; render(); }, false, STATE.ui.showReward.tip);
  }
}

function createModal(title, body, btnText, onClickFn, isWelcome, tipText=""){
  const div = document.createElement('div');
  div.id = 'modalHost';
  div.className = 'overlay';
  div.innerHTML = `<div class="modal">
    <div style="font-size:40px; margin-bottom:6px;">${isWelcome?'✨':'🏆'}</div>
    <h3>${title}</h3>
    <p style="white-space:pre-line">${body}</p>
    ${tipText? `<div class="tip">💡 ${tipText}</div>`:''}
    <button class="primary-btn close-btn" id="modalCloseBtn">${btnText}</button>
  </div>`;
  document.body.appendChild(div);
  document.getElementById('modalCloseBtn').onclick = onClickFn;
}

/* ================= INITIALIZATION ================= */
(async function init(){
  await loadAll();
  render();
})();

})();
</script>
</body>
</html>
