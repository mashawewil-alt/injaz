<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة إنجاز الذكية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #090a0f;
      --card-bg: #12141c;
      --card-hover: #1a1d29;
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-muted: #8e92a2;
      --accent-blue: #0a84ff;
      --accent-amber: #ff9f0a;
      --accent-green: #30d158;
      --accent-red: #ff453a;
      --accent-indigo: #5e5ce6;
      --radius-lg: 16px;
      --radius-md: 12px;
      --transition-smooth: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Tajawal', -apple-system, sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1, h2, h3 { font-family: 'Cairo', sans-serif; font-weight: 800; }

    .dashboard-container {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* العداد العلوي والساعة الميلادية */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 16px 20px;
      border-radius: var(--radius-lg);
    }

    .live-clock {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent-blue);
    }

    .points-badge {
      background: rgba(255, 159, 10, 0.1);
      border: 1px solid var(--accent-amber);
      color: var(--accent-amber);
      padding: 6px 14px;
      border-radius: 20px;
      font-weight: 900;
      font-size: 14px;
    }

    /* شريط التنقل العلوي الأصلي والسلس */
    .navigation-tabs {
      display: flex;
      gap: 10px;
      background: rgba(255, 255, 255, 0.03);
      padding: 6px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      overflow-x: auto;
    }

    .nav-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 10px 18px;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      border-radius: 8px;
      transition: var(--transition-smooth);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-btn:hover { color: var(--text-main); background: rgba(255,255,255,0.02); }
    .nav-btn.active {
      background: var(--accent-blue);
      color: #ffffff;
    }

    /* الكروت والعناصر المتناسقة */
    .main-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 20px;
      transition: var(--transition-smooth);
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .custom-input {
      flex: 1;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      transition: var(--transition-smooth);
    }
    .custom-input:focus { outline: none; border-color: var(--accent-blue); }

    .action-btn {
      background: var(--accent-blue);
      color: #ffffff;
      border: none;
      padding: 12px 24px;
      font-weight: 700;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      transition: var(--transition-smooth);
      white-space: nowrap;
    }
    .action-btn:active { transform: scale(0.98); }

    /* قوائم العناصر */
    .items-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }

    .item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      padding: 14px 18px;
      border-radius: var(--radius-md);
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .item-row.completed { opacity: 0.5; background: rgba(48, 209, 88, 0.02); }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--accent-red);
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      padding: 4px 8px;
    }

    /* مؤقت التركيز البسيط */
    .timer-box {
      text-align: center;
      padding: 16px;
      background: rgba(94, 92, 230, 0.05);
      border: 1px solid rgba(94, 92, 230, 0.2);
      border-radius: var(--radius-md);
      margin-top: 14px;
    }
    .timer-digits {
      font-size: 36px;
      font-family: monospace;
      font-weight: bold;
      color: var(--text-main);
      margin: 6px 0;
    }

    /* متجر المكافآت الشكلي */
    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      margin-top: 14px;
    }
    .shop-item {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 16px;
      text-align: center;
    }

    /* التذييل الاحترافي لـ مشعل */
    .app-footer {
      text-align: center;
      margin-top: auto;
      padding-top: 40px;
      padding-bottom: 10px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.8;
      width: 100%;
    }
    .app-footer b {
      color: var(--text-main);
      letter-spacing: 0.5px;
    }
    .app-footer .m-badge {
      display: inline-block;
      background: rgba(10, 132, 255, 0.1);
      color: var(--accent-blue);
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 700;
      margin-top: 4px;
    }

    /* التنبيهات المنبثقة الصغيره */
    .toast-container { position: fixed; bottom: 24px; left: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: #1c1c1e; border: 1px solid var(--border-color); color: #fff; padding: 12px 20px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); font-size: 13px; font-weight: 600; animation: slideIn 0.25s ease forwards; }
    @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>

  <div class="dashboard-container">
    
    <!-- الشريط العلوي والتاريخ الميلادي الصرف -->
    <div class="top-bar">
      <div class="live-clock" id="live-clock-gregorian">جاري تحميل الوقت الميلادي...</div>
      <div class="points-badge" id="points-display">🏆 0 نقطة</div>
    </div>

    <!-- شريط تصفح الأقسام الأصلي -->
    <nav class="navigation-tabs">
      <button class="nav-btn active" data-tab="home">🏡 الرئيسية</button>
      <button class="nav-btn" data-tab="tasks">📝 المهام اليومية</button>
      <button class="nav-btn" data-tab="habits">🌱 بناء العادات</button>
      <button class="nav-btn" data-tab="skills">🧠 اكتساب المهارات</button>
      <button class="nav-btn" data-tab="shop">🎁 متجر التحدي</button>
    </nav>

    <!-- الأقسام المتغيرة بسلاسة -->
    <main id="tab-content">
      <!-- جاري الحقن بواسطة JS -->
    </main>

    <!-- تذييل وحقوق المطور مشعل الفخمة -->
    <footer class="app-footer">
      حقوق الملكية والتطوير محفوظة للمطور <b>مشعل</b> © 2026<br>
      <span class="m-badge">الإصدار المميز v3.5 • الانضباط يصنع المجد 🚀</span>
    </footer>

  </div>

  <div id="toast-container" class="toast-container"></div>

  <script>
    // --- 1. إدارة البيانات المحليه ---
    const Storage = {
      get(k, fallback) { const d = localStorage.getItem('injaz_v35_'+k); return d ? JSON.parse(d) : fallback; },
      set(k, v) { localStorage.setItem('injaz_v35_'+k, JSON.stringify(v)); }
    };

    // --- 2. حالة المنصة ---
    const State = {
      points: Storage.get('points', 0),
      tasks: Storage.get('tasks', []),
      habits: Storage.get('habits', []),
      skills: Storage.get('skills', []), // تتبع المهارات الجديد
      currentTab: 'home'
    };

    // --- 3. محرك الوقت الميلادي فقط ---
    function initClock() {
      setInterval(() => {
        const el = document.getElementById('live-clock-gregorian');
        if(el) {
          const now = new Date();
          el.innerText = now.toLocaleDateString('ar-EG', {
            calendar: 'gregorian',
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: true
          });
        }
      }, 1000);
    }

    // --- 4. مؤقت التركيز (بومودورو) المدمج كإضافة ذكية ---
    const Timer = {
      secondsLeft: 1500, interval: null, running: false,
      toggle() {
        const btn = document.getElementById('timer-btn');
        if(this.running) {
          clearInterval(this.interval);
          this.running = false;
          if(btn) btn.innerText = 'ابدأ جلسة تركيز 🚀';
        } else {
          this.running = true;
          if(btn) btn.innerText = 'إيقاف مؤقت ⏸️';
          this.interval = setInterval(() => {
            if(this.secondsLeft > 0) {
              this.secondsLeft--;
              this.updateDOM();
            } else {
              clearInterval(this.interval);
              this.running = false;
              this.secondsLeft = 1500;
              State.points += 40;
              Storage.set('points', State.points);
              showToast("⏱️ تم التركيز!", "كفو عظيم! أنهيت جلسة كاملة بنجاح وكسبت +40 نقطة.");
              UI.refresh();
            }
          }, 1000);
        }
      },
      updateDOM() {
        const el = document.getElementById('timer-digits');
        if(!el) return;
        const m = Math.floor(this.secondsLeft / 60).toString().padStart(2, '0');
        const s = (this.secondsLeft % 60).toString().padStart(2, '0');
        el.innerText = `${m}:${s}`;
      }
    };

    // --- 5. التنبيهات البسيطة ---
    function showToast(title, msg) {
      const c = document.getElementById('toast-container');
      if(!c) return;
      const t = document.createElement('div');
      t.className = 'toast';
      t.innerText = `${title} - ${msg}`;
      c.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3500);
    }

    // --- 6. واجهة المستخدم والتنقل السلس ---
    const UI = {
      switchTab(tabId) {
        State.currentTab = tabId;
        document.querySelectorAll('.nav-btn').forEach(b => {
          b.classList.toggle('active', b.getAttribute('data-tab') === tabId);
        });
        this.refresh();
      },
      refresh() {
        // تحديث النقاط بالأعلى
        document.getElementById('points-display').innerText = `🏆 ${State.points} نقطة`;
        
        const container = document.getElementById('tab-content');
        if(!container) return;

        if(State.currentTab === 'home') {
          container.innerHTML = `
            <div class="main-card">
              <h2 style="font-size:18px; color:var(--accent-blue); margin-bottom:8px;">مرحباً بك في لوحة إنجاز المتكاملة</h2>
              <p style="font-size:14px; color:var(--text-muted); line-height:1.6;">
                منصتك الشخصية والآمنة لتنظيم يومك، تتبع عاداتك واكتساب المهارات بشكل عملي مستدام وبدون الحاجة لإنترنت.
              </p>
              
              <div class="timer-box">
                <h3 style="font-size:14px; color:var(--accent-indigo);">⏱️ مؤقت التركيز العميق المدمج (+40 نقطة)</h3>
                <div class="timer-digits" id="timer-digits">25:00</div>
                <button class="action-btn" id="timer-btn" style="background:var(--accent-indigo); padding:8px 16px; font-size:13px;" onclick="Timer.toggle()">ابدأ جلسة تركيز 🚀</button>
              </div>
            </div>
          `;
          Timer.updateDOM();
        }
        
        else if(State.currentTab === 'tasks') {
          let rows = '';
          State.tasks.forEach(t => {
            rows += `
              <div class="item-row ${t.done?'completed':''}">
                <div style="display:flex; align-items:center; gap:10px;">
                  <input type="checkbox" ${t.done?'checked':''} onchange="UI.toggleTask('${t.id}')" style="width:18px; height:18px; cursor:pointer;">
                  <span style="font-weight:600; font-size:14px;">${t.text}</span>
                </div>
                <button class="delete-btn" onclick="UI.deleteTask('${t.id}')">حذف</button>
              </div>
            `;
          });
          container.innerHTML = `
            <div class="main-card">
              <h3>📝 قائمة المهام اليومية (+15 نقطة عند الإنجاز)</h3>
              <div class="input-group">
                <input type="text" id="task-input" class="custom-input" placeholder="اكتب خطتك القادمة هنا...">
                <button class="action-btn" onclick="UI.addTask()">إضافة مهمة</button>
              </div>
              <div class="items-list">${rows || '<p style="text-align:center; color:var(--text-muted); padding:10px; font-size:13px;">لا توجد مهام حالية.</p>'}</div>
            </div>
          `;
        }
        
        else if(State.currentTab === 'habits') {
          let rows = '';
          State.habits.forEach(h => {
            rows += `
              <div class="item-row">
                <div>
                  <span style="font-weight:600; font-size:15px;">${h.text}</span>
                  <div style="font-size:11px; color:var(--accent-green); margin-top:2px;">التزامك المستمر: <b>${h.streak} أيام</b> 🔥</div>
                </div>
                <div style="display:flex; gap:10px;">
                  <button class="action-btn" style="padding:6px 12px; font-size:12px; background:var(--accent-green); color:#000;" onclick="UI.logHabit('${h.id}')">تسجيل اليوم</button>
                  <button class="delete-btn" onclick="UI.deleteHabit('${h.id}')">حذف</button>
                </div>
              </div>
            `;
          });
          container.innerHTML = `
            <div class="main-card">
              <h3>🌱 بناء وتثبيت العادات السلوكية (+10 نقاط)</h3>
              <div class="input-group">
                <input type="text" id="habit-input" class="custom-input" placeholder="مثال: القراءة، شرب الماء، الرياضة...">
                <button class="action-btn" style="background:var(--accent-green); color:#000;" onclick="UI.addHabit()">تثبيت العادة</button>
              </div>
              <div class="items-list">${rows || '<p style="text-align:center; color:var(--text-muted); padding:10px; font-size:13px;">لم تقم بتثبيت أي عادة بعد.</p>'}</div>
            </div>
          `;
        }
        
        // قسم تتبع اكتساب المهارات الجديد كلياً وبنفس التصميم الأصلي
        else if(State.currentTab === 'skills') {
          let rows = '';
          State.skills.forEach(s => {
            rows += `
              <div class="item-row">
                <div>
                  <span style="font-weight:600; font-size:15px; color:var(--accent-blue);">${s.text}</span>
                  <div style="font-size:12px; color:var(--text-muted); margin-top:2px;">ساعات التدريب الفعلي المتراكمة: <b style="color:var(--accent-amber); font-size:14px;">${s.hours} ساعة</b> 🧠</div>
                </div>
                <div style="display:flex; gap:10px;">
                  <button class="action-btn" style="padding:6px 12px; font-size:12px; background:var(--accent-blue);" onclick="UI.trainSkill('${s.id}')">+ إضافة ساعة تدريب</button>
                  <button class="delete-btn" onclick="UI.deleteSkill('${s.id}')">حذف</button>
                </div>
              </div>
            `;
          });
          container.innerHTML = `
            <div class="main-card">
              <h3>🧠 تتبع واكتساب المهارات العميقة (+20 نقطة/ساعة)</h3>
              <p style="font-size:12px; color:var(--text-muted); margin-top:2px; margin-bottom:10px;">أضف مجالات التركيز الطويل وضاعف ساعات تدريبك الفعلي لرفع مستواك الذهني وقدراتك.</p>
              <div class="input-group">
                <input type="text" id="skill-input" class="custom-input" placeholder="مثال: تعلم اللغة الإنجليزية، البرمجة، صيانة الموبايل...">
                <button class="action-btn" onclick="UI.addSkill()">بدء المسار</button>
              </div>
              <div class="items-list">${rows || '<p style="text-align:center; color:var(--text-muted); padding:10px; font-size:13px;">لم تبدأ في تتبع أي مهارة بعد، ابدأ الآن يا بطل!</p>'}</div>
            </div>
          `;
        }
        
        else if(State.currentTab === 'shop') {
          container.innerHTML = `
            <div class="main-card">
              <h3>🎁 متجر التحدي والمكافآت والتحفيز الذاتي</h3>
              <p style="font-size:13px; color:var(--text-muted); margin-top:4px;">استبدل نقاط طاقاتك المتراكمة ببطاقات تحفيزية مميزة.</p>
              <div class="shop-grid">
                <div class="shop-item"><div>🎁</div><div style="font-weight:700;font-size:13px;margin:4px 0;">صندوق المفاجأة الأدبية</div><button class="action-btn" style="padding:4px 8px; font-size:11px; width:100%;" onclick="UI.buyItem(20)">20 نقطة</button></div>
                <div class="shop-item"><div>⚽</div><div style="font-weight:700;font-size:13px;margin:4px 0;">بطاقة الطاقة الرياضية</div><button class="action-btn" style="padding:4px 8px; font-size:11px; width:100%;" onclick="UI.buyItem(40)">40 نقطة</button></div>
                <div class="shop-item"><div>📚</div><div style="font-weight:700;font-size:13px;margin:4px 0;">حكمة وفلسفة عميقة</div><button class="action-btn" style="padding:4px 8px; font-size:11px; width:100%;" onclick="UI.buyItem(50)">50 نقطة</button></div>
              </div>
            </div>
          `;
        }
      },

      // إجراءات المهام
      addTask() {
        const inp = document.getElementById('task-input');
        if(!inp || !inp.value.trim()) return;
        State.tasks.push({ id: 't_'+Date.now(), text: inp.value.trim(), done: false });
        Storage.set('tasks', State.tasks);
        showToast("📝 تم الإضافة", "تم إدراج خطتك الجديدة بنجاح.");
        this.refresh();
      },
      toggleTask(id) {
        const t = State.tasks.find(x => x.id === id);
        if(t) {
          t.done = !t.done;
          State.points += t.done ? 15 : -15;
          Storage.set('tasks', State.tasks);
          Storage.set('points', State.points);
          showToast(t.done ? "🏆 كفو البطل" : "↩️ تم التراجع", t.done ? "حققت هدفك وكسبت +15 نقطة!" : "تم خصم نقاط المهمة.");
          this.refresh();
        }
      },
      deleteTask(id) {
        State.tasks = State.tasks.filter(x => x.id !== id);
        Storage.set('tasks', State.tasks);
        this.refresh();
      },

      // إجراءات العادات
      addHabit() {
        const inp = document.getElementById('habit-input');
        if(!inp || !inp.value.trim()) return;
        State.habits.push({ id: 'h_'+Date.now(), text: inp.value.trim(), streak: 0 });
        Storage.set('habits', State.habits);
        showToast("🌱 عادة جديدة", "تم التثبيت بنجاح، الاستمرار يصنع الفارق.");
        this.refresh();
      },
      logHabit(id) {
        const h = State.habits.find(x => x.id === id);
        if(h) {
          h.streak++;
          State.points += 10;
          Storage.set('habits', State.habits);
          Storage.set('points', State.points);
          showToast("🔥 التزام مستمر", `فخور بك، كسبت +10 نقاط طاقة في [${h.text}]`);
          this.refresh();
        }
      },
      deleteHabit(id) {
        State.habits = State.habits.filter(x => x.id !== id);
        Storage.set('habits', State.habits);
        this.refresh();
      },

      // إجراءات المهارات الجديدة بالكامل
      addSkill() {
        const inp = document.getElementById('skill-input');
        if(!inp || !inp.value.trim()) return;
        State.skills.push({ id: 's_'+Date.now(), text: inp.value.trim(), hours: 0 });
        Storage.set('skills', State.skills);
        showToast("🧠 مسار مهارة", "تم فتح مسار تتبع مهاراتك العميقة بنجاح 🚀");
        this.refresh();
      },
      trainSkill(id) {
        const s = State.skills.find(x => x.id === id);
        if(s) {
          s.hours++;
          State.points += 20;
          Storage.set('skills', State.skills);
          Storage.set('points', State.points);
          showToast("📚 ساعة عمل", `عظيم جداً! أنجزت ساعة تدريب في [${s.text}] ونلت +20 نقطة طاقة.`);
          this.refresh();
        }
      },
      deleteSkill(id) {
        State.skills = State.skills.filter(x => x.id !== id);
        Storage.set('skills', State.skills);
        this.refresh();
      },

      buyItem(price) {
        if(State.points < price) {
          showToast("❌ نقاط غير كافية", `تحتاج إلى ${price} نقطة لفتح هذه المكافأة.`);
          return;
        }
        State.points -= price;
        Storage.set('points', State.points);
        showToast("🎉 فتح مكافأة", "تم فتح بطاقتك بنجاح ومكافأتك مستحقة!");
        this.refresh();
      }
    };

    // --- 7. ربط الأحداث والتشغيل الأول المضمون ---
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        UI.switchTab(btn.getAttribute('data-tab'));
      });
    });

    initClock();
    UI.refresh();
  </script>
</body>
</html>
