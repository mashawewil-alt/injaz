<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>إنجاز | Premium iOS Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --ios-bg: #000000;
      --ios-secondary: #121214;
      --ios-card: #1c1c1e;
      --ios-card-hover: #2c2c2e;
      --ios-border: rgba(255, 255, 255, 0.08);
      --ios-text: #ffffff;
      --ios-text-muted: #8e8e93;
      --ios-text-dim: #aeaeae;
      --ios-blue: #0a84ff;
      --ios-amber: #ff9f0a;
      --ios-green: #30d158;
      --ios-red: #ff453a;
      --ios-indigo: #5e5ce6;
      --radius-ios-lg: 16px;
      --radius-ios-md: 12px;
      --shadow-ios: 0 4px 20px rgba(0, 0, 0, 0.4);
      --transition-ios: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    [data-theme="light"] {
      --ios-bg: #f2f2f7;
      --ios-secondary: #ffffff;
      --ios-card: #ffffff;
      --ios-card-hover: #e5e5ea;
      --ios-border: rgba(0, 0, 0, 0.05);
      --ios-text: #000000;
      --ios-text-muted: #8e8e93;
      --ios-text-dim: #3a3a3c;
      --ios-blue: #007aff;
      --ios-amber: #ff9500;
      --ios-green: #34c759;
      --ios-red: #ff3b30;
      --ios-indigo: #5856d6;
      --shadow-ios: 0 4px 15px rgba(0, 0, 0, 0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background-color: var(--ios-bg);
      color: var(--ios-text);
      font-family: -apple-system, BlinkMacSystemFont, 'Tajawal', sans-serif;
      min-height: 100vh;
      transition: var(--transition-ios);
      padding-bottom: 110px; /* زيادة بسيطة لإعطاء مساحة مريحة للحقوق */
    }
    h1, h2, h3, .ios-font-cairo { font-family: 'Cairo', sans-serif; font-weight: 800; }
    
    .app-container { max-width: 500px; margin: 0 auto; padding: 16px; }
    
    /* Setup Screen */
    .setup-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--ios-bg); z-index:99999; display:flex; align-items:center; justify-content:center; padding:24px; }
    
    /* Premium App Store Elements */
    .ios-card {
      background: var(--ios-card);
      border: 1px solid var(--ios-border);
      border-radius: var(--radius-ios-lg);
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-ios);
      transition: var(--transition-ios);
    }
    
    .ios-clock-bar {
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--ios-blue);
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }
    
    .ios-btn-blue {
      background: var(--ios-blue); color: #ffffff; border: none; border-radius: var(--radius-ios-md);
      padding: 12px 20px; font-weight: 700; cursor: pointer; transition: var(--transition-ios);
      display: inline-flex; align-items: center; gap: 8px; justify-content: center;
    }
    .ios-btn-blue:active { transform: scale(0.97); filter: brightness(0.9); }
    .ios-btn-blue:disabled { background: var(--ios-text-muted); opacity: 0.5; }
    
    .ios-btn-secondary {
      background: var(--ios-secondary); color: var(--ios-text); border: 1px solid var(--ios-border);
      border-radius: var(--radius-ios-md); padding: 10px 16px; font-weight: 600; cursor: pointer; transition: var(--transition-ios);
    }
    .ios-btn-secondary:active { background: var(--ios-card-hover); }

    /* Bottom iOS Tab Navigation Bar */
    .ios-bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 500px; background: rgba(28, 28, 30, 0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--ios-border);
      display: flex; justify-content: space-around; padding: 8px 4px calc(8px + env(safe-area-inset-bottom));
      z-index: 9999;
    }
    [data-theme="light"] .ios-bottom-nav { background: rgba(255, 255, 255, 0.85); }
    
    .ios-nav-item {
      background: transparent; border: none; color: var(--ios-text-muted);
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; flex: 1; transition: var(--transition-ios);
    }
    .ios-nav-item.active { color: var(--ios-blue); }
    .ios-nav-icon { font-size: 20px; }
    .ios-nav-text { font-size: 11px; font-weight: 700; font-family: 'Cairo', sans-serif; }
    
    /* Lists & Content */
    .ios-item-row {
      display: flex; align-items: center; gap: 14px; background: var(--ios-secondary);
      border: 1px solid var(--ios-border); border-radius: var(--radius-ios-md);
      padding: 14px; margin-bottom: 10px; transition: var(--transition-ios);
    }
    .ios-item-row.completed { opacity: 0.5; background: rgba(48, 209, 88, 0.03); }
    
    .ios-input {
      width: 100%; background: var(--ios-secondary); border: 1px solid var(--ios-border);
      color: var(--ios-text); padding: 12px 14px; border-radius: var(--radius-ios-md);
      font-family: 'Tajawal', sans-serif; font-size: 14px; transition: var(--transition-ios);
    }
    .ios-input:focus { outline: none; border-color: var(--ios-blue); }
    
    /* الحقوق المضافة */
    .ios-app-footer {
      text-align: center;
      font-size: 11px;
      color: var(--ios-text-muted);
      padding: 24px 0 12px 0;
      line-height: 1.6;
      font-weight: 500;
    }
    .ios-app-footer b {
      color: var(--ios-text-dim);
    }
    
    .toast-container { position: fixed; top: env(safe-area-inset-top, 20px); left: 50%; transform: translateX(-50%); z-index: 999999; width: 90%; max-width: 400px; }
    .ios-toast { background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(10px); border: 1px solid var(--ios-border); color: #fff; padding: 14px; border-radius: 14px; box-shadow: var(--shadow-ios); font-weight: 600; text-align: center; font-size: 13px; margin-bottom: 8px; animation: iosSlide 0.3s ease forwards; }
    @keyframes iosSlide { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    
    .ios-modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index:999999; display:flex; align-items:center; justify-content:center; padding:20px; }
    .timer-display { font-size: 48px; font-family: monospace; font-weight: bold; color: var(--ios-text); margin: 10px 0; letter-spacing: 2px; }
  </style>
</head>
<body>

  <div id="setup-root"></div>
  <div id="app" class="app-container"></div>
  <div id="toast-container" class="toast-container"></div>
  <div id="reward-modal-root"></div>

  <script>
    // --- 1. STORAGE MANAGEMENT ---
    const Storage = {
      prefix: 'injaz_apple_v3_',
      get(key, fallback) {
        const data = localStorage.getItem(this.prefix + key);
        return data ? JSON.parse(data) : fallback;
      },
      set(key, val) { localStorage.setItem(this.prefix + key, JSON.stringify(val)); }
    };

    // --- 2. THE LITERARY QUOTE POOL ---
    const QuotesPool = [
      "«الذكاء دون طموح كطائر دون أجنحة.»",
      "«من يملك سبباً يعيش من أجله، يمكنه تحمل أي شيء تقريباً.»",
      "«الرحلة الحقيقية للاكتشاف لا تتكون من البحث عن أراضٍ جديدة، بل من امتلاك عيون جديدة.»",
      "«الانضباط هو الجسر بين الأهداف والإنجازات.»"
    ];

    // --- 3. EXCLUSIVE REWARDS POOL ---
    const RewardsPool = [
      { id: 1, text: "🤝 مدح وثناء: فخور بوعيك وثباتك الأسطوري الشجاع اليوم.\n🎬 مقولة شهيرة: 'السر في المضي قدماً هو البدء' - مارك توين.\n🎯 اقتراح بسيط: تصفح فكرة تطويرية لمدّة 5 دقائق لترقية مداركك.\n💡 تذكير: انضباطك الواعي اليوم يصنع مجد الغد الحقيقي." },
      { id: 2, text: "🔥 مدح وثناء: خطواتك ثابتة ومبهرة للغاية يا بطل.\n🎬 مقولة شهيرة: 'العظيم لا يُنجز بالقوة بل بالمثابرة' - صامويل جونسون.\n🎯 اقتراح بسيط: اكتب الآن خاطرة أو اقتباساً لافتاً في مساحتك الخاصة.\n💡 تذكير: الأيام التي تقاوم فيها كسلك هي التي تبني معدنك." },
      { id: 3, text: "🏆 مدح وثناء: عمل منظم ونقاء ذهني يدرّس!\n🎬 مقولة شهيرة: 'أفضل طريقة للتنبؤ بالمستقبل هي صناعته' - ألان كاي.\n🎯 اقتراح بسيط: خذ 10 أنفاس عميقة لتجديد طاقتك الذهنية بالكامل.\n💡 تذكير: النجاح هو الاستمرارية البسيطة في الاتجاه الصحيح." },
      { id: 4, text: "💎 مدح وثناء: روحك العالية تمنح لوحتك طاقة إنجاز حقيقية.\n🎬 مقولة شهيرة: 'لا يهم كم أنت بطيء طالما أنك لا تتوقف' - كونفوشيوس.\n🎯 اقتراح بسيط: اشرب كوباً كاملاً من الماء النقي لإنعاش دورتك الدموية فوراً.\n💡 تذكير: الأهداف الكبيرة تتفكك لخطوات صغيرة، فاستمر بالصعود." }
    ];

    // --- 4. APP STATE ---
    const State = {
      username: Storage.get('username', ''),
      tasks: Storage.get('tasks', []),
      habits: Storage.get('habits', []),
      skills: Storage.get('skills', []),
      points: Storage.get('points', 0),
      usedRewards: Storage.get('usedRewards', []),
      dailyQuote: QuotesPool[Math.floor(Math.random() * QuotesPool.length)]
    };

    // --- 5. APP ACTIONS ---
    const Actions = {
      initUser(name) {
        if(!name.trim()) return;
        State.username = name.trim();
        Storage.set('username', State.username);
        Notify.toast("🍏 نظام آبل الذكي", `مرحباً بك في إنجاز يا ${State.username}!`);
        UI.renderSetup();
        UI.renderApp();
      },
      addTask(title, prio) {
        State.tasks.push({ id: 't_'+Date.now(), title, prio, completed: false });
        this._sync();
        Notify.toast("📝 مهمة مضافة", `تم إدراج المهمة بنجاح، بانتظار تميزك.`);
      },
      toggleTask(id) {
        const t = State.tasks.find(x => x.id === id);
        if(t) {
          t.completed = !t.completed;
          State.points += t.completed ? 15 : -15;
          this._sync();
          if(t.completed) Notify.toast("🏆 إنجاز رائع!", `كسبت +15 نقطة طاقة يا ${State.username}.`);
        }
      },
      deleteTask(id) { State.tasks = State.tasks.filter(x => x.id !== id); this._sync(); },
      
      addHabit(name) {
        State.habits.push({ id: 'h_'+Date.now(), name, streak: 0 });
        this._sync();
        Notify.toast("🌱 عادة سلوكية", `تم تثبيت العادة بنجاح. الاستمرار يصنع المعجزات.`);
      },
      logHabit(id) {
        const h = State.habits.find(x => x.id === id);
        if(h) { h.streak++; State.points += 10; this._sync(); Notify.toast("🔥 شعلة التزام", `تقدم ممتاز في [${h.name}]! كسبت +10 نقاط.`); }
      },
      deleteHabit(id) { State.habits = State.habits.filter(x => x.id !== id); this._sync(); },
      
      addSkill(name) {
        State.skills.push({ id: 's_'+Date.now(), name, hours: 0 });
        this._sync();
        Notify.toast("🧠 مهارة جديدة", `تم بدء مسار اكتساب مهارة: [${name}] 🚀`);
      },
      trainSkill(id) {
        const s = State.skills.find(x => x.id === id);
        if(s) { s.hours++; State.points += 20; this._sync(); Notify.toast("📚 ساعة تدريب", `كفو! أضفت ساعة عمل على مهارة [${s.name}] وكسبت +20 نقطة طاقة.`); }
      },
      deleteSkill(id) { State.skills = State.skills.filter(x => x.id !== id); this._sync(); },
      
      buyReward(price, name, icon) {
        if(State.points < price) { Notify.toast("❌ عذراً البطل", `النقاط غير كافية، تحتاج إلى ${price} نقطة.`); return; }
        let avail = RewardsPool.filter(r => !State.usedRewards.includes(r.id));
        if(avail.length === 0) { State.usedRewards = []; avail = RewardsPool; }
        const reward = avail[Math.floor(Math.random() * avail.length)];
        State.points -= price;
        State.usedRewards.push(reward.id);
        this._sync();
        UI.showRewardModal(icon, name, reward.text);
      },
      _sync() {
        Storage.set('tasks', State.tasks); Storage.set('habits', State.habits);
        Storage.set('skills', State.skills); Storage.set('points', State.points);
        Storage.set('usedRewards', State.usedRewards);
        UI.renderApp();
      }
    };

    // --- 6. NATIVE NOTIFICATION & TOAST ---
    const Notify = {
      async request() { if('Notification' in window) await Notification.requestPermission(); },
      toast(title, text) {
        const container = document.getElementById('toast-container');
        if(!container) return;
        const toast = document.createElement('div');
        toast.className = 'ios-toast';
        toast.innerText = `${title}\n${text}`;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 4000);
      }
    };

    // --- 7. FOCUS TIMER ENGINE ---
    const Timer = {
      secondsLeft: 1500, interval: null, running: false,
      toggle() {
        if(this.running) { clearInterval(this.interval); this.running = false; }
        else {
          this.running = true;
          this.interval = setInterval(() => {
            if(this.secondsLeft > 0) { this.secondsLeft--; UI.updateTimerDOM(); }
            else {
              clearInterval(this.interval); this.running = false; this.secondsLeft = 1500;
              State.points += 40; Storage.set('points', State.points); UI.renderApp();
              Notify.toast("⏱️ تم التركيز بنجاح!", `كفو عظيم! أنهيت جلسة بومودورو بنجاح وكسبت +40 نقطة طاقة يا ${State.username}.`);
            }
          }, 1000);
        }
        UI.updateTimerDOM();
      }
    };

    // --- 8. UI RENDERER ---
    const UI = {
      currentTab: 'home',
      initClock() {
        setInterval(() => {
          const el = document.getElementById('ios-live-time');
          if(el) {
            const now = new Date();
            el.innerText = now.toLocaleDateString('ar-EG', { calendar: 'gregorian', weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
          }
        }, 1000);
      },
      renderSetup() {
        const root = document.getElementById('setup-root');
        if(State.username) { root.innerHTML = ''; return; }
        root.innerHTML = `
          <div class="setup-overlay">
            <div class="ios-card" style="width:100%; max-width:400px; text-align:center;">
              <span style="font-size:50px;">🍏</span>
              <h2 style="margin-top:10px; color:var(--ios-blue);">مرحباً بك في إنجاز</h2>
              <p style="font-size:13px; color:var(--ios-text-muted); margin-bottom:18px;">قم بتهيئة مساحتك الذكية الفاخرة</p>
              <input type="text" id="setup-name" class="ios-input" placeholder="اكتب اسمك الأول..." style="text-align:center; margin-bottom:14px;">
              <button class="ios-btn-blue" id="setup-btn" style="width:100%;">دخول للمنصة</button>
            </div>
          </div>
        `;
        document.getElementById('setup-btn').addEventListener('click', () => {
          Actions.initUser(document.getElementById('setup-name').value);
        });
      },
      renderApp() {
        if(!State.username) return;
        const app = document.getElementById('app');
        let html = `
          <div class="ios-clock-bar" id="ios-live-time">جاري التحميل...</div>
          <header class="ios-card" style="display:flex; justify-content:space-between; align-items:center; background:var(--ios-secondary);">
            <div>
              <h2 style="font-size:20px;">🏡 الرئيسية</h2>
              <p style="font-size:12px; color:var(--ios-text-muted);">أهلاً بك يا ${State.username}</p>
            </div>
            <div style="background:var(--ios-card-hover); border:1px solid var(--ios-border); padding:6px 12px; border-radius:10px; font-weight:900; color:var(--ios-amber); font-size:13px;">
              🏆 ${State.points} نقطة
            </div>
          </header>
        `;

        if(this.currentTab === 'home') html += this._buildHome();
        if(this.currentTab === 'tasks') html += this._buildTasks();
        if(this.currentTab === 'habits') html += this._buildHabits();
        if(this.currentTab === 'skills') html += this._buildSkills();
        if(this.currentTab === 'shop') html += this._buildShop();

        // إدراج التذييل (Footer) بالحقوق الحصرية قبل نهاية الـ Container
        html += `
          <footer class="ios-app-footer">
            جميع الحقوق محفوظة © <b>مشعل</b> | 2026<br>
            <span>تصميم متقن • الانضباط يصنع المجد 🚀</span>
          </footer>
        `;

        html += `
          <nav class="ios-bottom-nav">
            <button class="ios-nav-item ${this.currentTab === 'home'?'active':''}" data-t="home"><span class="ios-nav-icon">🏡</span><span class="ios-nav-text">الرئيسية</span></button>
            <button class="ios-nav-item ${this.currentTab === 'tasks'?'active':''}" data-t="tasks"><span class="ios-nav-icon">📝</span><span class="ios-nav-text">المهام</span></button>
            <button class="ios-nav-item ${this.currentTab === 'habits'?'active':''}" data-t="habits"><span class="ios-nav-icon">🌱</span><span class="ios-nav-text">العادات</span></button>
            <button class="ios-nav-item ${this.currentTab === 'skills'?'active':''}" data-t="skills"><span class="ios-nav-icon">🧠</span><span class="ios-nav-text">المهارات</span></button>
            <button class="ios-nav-item ${this.currentTab === 'shop'?'active':''}" data-t="shop"><span class="ios-nav-icon">🎁</span><span class="ios-nav-text">المتجر</span></button>
          </nav>
        `;
        app.innerHTML = html;
        this._bind();
      },
      _buildHome() {
        const hour = new Date().getHours();
        const greet = hour < 12 ? `صباح الخير يا ${State.username} ✨` : `مساء الخير يا ${State.username} 🌙`;
        const comp = State.tasks.filter(t => t.completed).length;
        const pend = State.tasks.filter(t => !t.completed).length;
        
        return `
          <div class="ios-card" style="background: linear-gradient(135deg, var(--ios-card), #101520); border-color: var(--ios-indigo);">
            <h3 style="font-size:16px; margin-bottom:6px; color:var(--ios-blue);">${greet}</h3>
            <p style="font-size:13px; line-height:1.5; color:var(--ios-text-dim);">
              📊 أنجزت اليوم <b style="color:var(--ios-green);">${comp}</b> مهمة، ومتبقي في قائمتك المعلقة <b style="color:var(--ios-red);">${pend}</b> عمل يتطلب تركيزك.
            </p>
          </div>
          
          <div class="ios-card" style="border-color: rgba(255,159,10,0.15); background: rgba(255,159,10,0.02);">
            <span style="font-size:11px; font-weight:800; color:var(--ios-amber);">💭 مقتبس ملهم اليوم</span>
            <p style="font-size:14px; font-style:italic; margin-top:4px; font-weight:700;">${State.dailyQuote}</p>
          </div>

          <div class="ios-card" style="text-align:center;">
            <h3 style="font-size:15px; margin-bottom:4px;">⏱️ مؤقت التركيز العميق (+40 نقطة)</h3>
            <p style="font-size:12px; color:var(--ios-text-muted);">جلسة بومودورو سريعة تمنع التشتت</p>
            <div class="timer-display" id="timer-box">25:00</div>
            <button class="ios-btn-blue" id="btn-timer-toggle" style="width:100%; background:var(--ios-indigo);">${Timer.running?'إيقاف مؤقت':'ابدأ التركيز الآن 🚀'}</button>
          </div>
        `;
      },
      _buildTasks() {
        let rows = '';
        State.tasks.forEach(t => {
          rows += `
            <div class="ios-item-row ${t.completed?'completed':''}">
              <input type="checkbox" class="task-chk" data-id="${t.id}" ${t.completed?'checked':''} style="width:20px; height:20px; cursor:pointer;">
              <div style="flex:1; font-weight:700; font-size:14px;">${t.title}</div>
              <button class="ios-btn-secondary btn-del-task" data-id="${t.id}" style="padding:4px 8px; font-size:11px; color:var(--ios-red); border:none;">حذف</button>
            </div>
          `;
        });
        return `
          <div class="ios-card">
            <h3 style="font-size:15px; margin-bottom:10px;">➕ إضافة مهمة (+15 نقطة)</h3>
            <div style="display:flex; flex-direction:column; gap:8px;">
              <input type="text" id="task-in" class="ios-input" placeholder="ما هي خطتك القادمة؟">
              <button class="ios-btn-blue" id="task-add-btn">حفظ المهمة</button>
            </div>
          </div>
          <div>${rows || '<p style="text-align:center; color:var(--ios-text-muted); font-size:13px; padding:20px;">لا توجد مهام حالية.</p>'}</div>
        `;
      },
      _buildHabits() {
        let rows = '';
        State.habits.forEach(h => {
          rows += `
            <div class="ios-item-row" style="justify-content:space-between;">
              <div>
                <div style="font-weight:700; font-size:15px;">${h.name}</div>
                <div style="font-size:11px; color:var(--ios-text-muted); margin-top:2px;">التزامك: <b style="color:var(--ios-green);">${h.streak} أيام</b> 🔥</div>
              </div>
              <div style="display:flex; gap:6px;">
                <button class="ios-btn-blue btn-log-hab" data-id="${h.id}" style="padding:6px 12px; font-size:11px;">تسجيل</button>
                <button class="ios-btn-secondary btn-del-hab" data-id="${h.id}" style="padding:6px 12px; font-size:11px; color:var(--ios-red); border:none;">حذف</button>
              </div>
            </div>
          `;
        });
        return `
          <div class="ios-card">
            <h3 style="font-size:15px; margin-bottom:10px;">🌱 تثبيت عادة جديدة (+10 نقاط)</h3>
            <div style="display:flex; gap:8px;">
              <input type="text" id="hab-in" class="ios-input" placeholder="مثال: القراءة، شرب الماء...">
              <button class="ios-btn-blue" id="hab-add-btn" style="white-space:nowrap;">تثبيت</button>
            </div>
          </div>
          <div>${rows || '<p style="text-align:center; color:var(--ios-text-muted); font-size:13px; padding:20px;">لم تقم بتثبيت أي عادات بعد.</p>'}</div>
        `;
      },
      _buildSkills() {
        let rows = '';
        State.skills.forEach(s => {
          rows += `
            <div class="ios-item-row" style="justify-content:space-between;">
              <div style="flex:1;">
                <div style="font-weight:700; font-size:15px; color:var(--ios-blue);">${s.name}</div>
                <div style="font-size:11px; color:var(--ios-text-muted); margin-top:2px;">إجمالي ساعات التدريب الفعلي: <b style="color:var(--ios-amber); font-size:13px;">${s.hours} ساعة</b> 🧠</div>
              </div>
              <div style="display:flex; gap:6px;">
                <button class="ios-btn-blue btn-train-sk" data-id="${s.id}" style="padding:6px 12px; font-size:11px; background:var(--ios-indigo);">+ إضافة ساعة</button>
                <button class="ios-btn-secondary btn-del-sk" data-id="${s.id}" style="padding:6px 12px; font-size:11px; color:var(--ios-red); border:none;">حذف</button>
              </div>
            </div>
          `;
        });
        return `
          <div class="ios-card">
            <h3 style="font-size:15px; margin-bottom:4px;">🧠 اكتساب وتتبع المهارات العميقة</h3>
            <p style="font-size:11px; color:var(--ios-text-muted); margin-bottom:10px;">أضف المهارة التي تتعلمها حالياً، وكل ساعة عمل تمنحك +20 نقطة طاقة ومستوى أعلى.</p>
            <div style="display:flex; gap:8px;">
              <input type="text" id="sk-user-in" class="ios-input" placeholder="مثال: تعلم اللغة الإنجليزية...">
              <button class="ios-btn-blue" id="sk-add-btn" style="white-space:nowrap;">بدء المسار</button>
            </div>
          </div>
          <div>${rows || '<p style="text-align:center; color:var(--ios-text-muted); font-size:13px; padding:20px;">لم تبدأ في تتبع أي مهارة بعد.</p>'}</div>
        `;
      },
      _buildShop() {
        const items = [
          { name: 'صندوق المفاجآت الأدبية', price: 20, icon: '🎁' },
          { name: 'كرة المجد الرياضية', price: 40, icon: '⚽' },
          { name: 'كتاب الفلسفة والحكمة', price: 60, icon: '📚' },
          { name: 'قطرة النقاء والتوازن', price: 15, icon: '💧' }
        ];
        let cards = '';
        items.forEach(i => {
          const can = State.points >= i.price;
          cards += `
            <div style="background:var(--ios-secondary); border:1px solid var(--ios-border); border-radius:12px; padding:14px; text-align:center; display:flex; flex-direction:column; justify-content:space-between; gap:6px;">
              <div style="font-size:32px;">${i.icon}</div>
              <div style="font-weight:700; font-size:12px;">${i.name}</div>
              <div style="font-size:12px; color:var(--ios-amber); font-weight:bold;">${i.price} نقطة</div>
              <button class="ios-btn-blue btn-buy" data-price="${i.price}" data-name="${i.name}" data-icon="${i.icon}" style="padding:6px; font-size:11px;" ${can?'':'disabled'}>${can?'شراء وفتح':'قفل 🔒'}</button>
            </div>
          `;
        });
        return `
          <div class="ios-card">
            <h3 style="color:var(--ios-amber); font-size:16px;">🎁 متجر المكافآت والتحفيز</h3>
            <p style="font-size:12px; color:var(--ios-text-muted); margin-top:2px;">استثمر نقاطك المتراكمة لفتح بطاقات تشجيعية فريدة.</p>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px;">${cards}</div>
          </div>
        `;
      },
      updateTimerDOM() {
        const el = document.getElementById('timer-box');
        if(!el) return;
        const m = Math.floor(Timer.secondsLeft / 60).toString().padStart(2, '0');
        const s = (Timer.secondsLeft % 60).toString().padStart(2, '0');
        el.innerText = `${m}:${s}`;
      },
      showRewardModal(icon, name, text) {
        const root = document.getElementById('reward-modal-root');
        root.innerHTML = `
          <div class="ios-modal">
            <div class="ios-card" style="width:100%; max-width:420px; text-align:center; background:var(--ios-secondary); border-color:var(--ios-amber);">
              <div style="font-size:55px;">${icon}</div>
              <h2 style="color:var(--ios-amber); font-size:20px; margin-top:6px;">تم فتح: ${name} 🎉</h2>
              <p style="font-size:11px; color:var(--ios-text-muted); margin-bottom:12px;">مكافأة حصرية مخصصة لـلبطل: ${State.username}</p>
              <div style="background:var(--ios-card); border:1px solid var(--ios-border); padding:14px; border-radius:10px; font-size:13px; line-height:1.6; text-align:right; white-space:pre-line; margin-bottom:16px;">
                ${text}
              </div>
              <button class="ios-btn-blue" id="close-modal" style="width:100%;">العودة ومواصلة العطاء 🚀</button>
            </div>
          </div>
        `;
        document.getElementById('close-modal').addEventListener('click', () => root.innerHTML = '');
      },
      _bind() {
        document.querySelectorAll('.ios-nav-item').forEach(btn => {
          btn.addEventListener('click', () => { this.currentTab = btn.getAttribute('data-t'); this.renderApp(); });
        });
        
        const tBtn = document.getElementById('btn-timer-toggle');
        if(tBtn) tBtn.addEventListener('click', () => Timer.toggle());
        
        const taskAdd = document.getElementById('task-add-btn');
        if(taskAdd) {
          taskAdd.addEventListener('click', () => {
            const title = document.getElementById('task-in').value;
            if(title.trim()) Actions.addTask(title, 'medium');
          });
        }
        document.querySelectorAll('.task-chk').forEach(c => {
          c.addEventListener('change', () => Actions.toggleTask(c.getAttribute('data-id')));
        });
        document.querySelectorAll('.btn-del-task').forEach(b => {
          b.addEventListener('click', () => Actions.deleteTask(b.getAttribute('data-id')));
        });
        
        const habAdd = document.getElementById('hab-add-btn');
        if(habAdd) {
          habAdd.addEventListener('click', () => {
            const n = document.getElementById('hab-in').value;
            if(n.trim()) Actions.addHabit(n);
          });
        }
        document.querySelectorAll('.btn-log-hab').forEach(b => {
          b.addEventListener('click', () => Actions.logHabit(b.getAttribute('data-id')));
        });
        document.querySelectorAll('.btn-del-hab').forEach(b => {
          b.addEventListener('click', () => Actions.deleteHabit(b.getAttribute('data-id')));
        });

        const skAdd = document.getElementById('sk-add-btn');
        if(skAdd) {
          skAdd.addEventListener('click', () => {
            const n = document.getElementById('sk-user-in').value;
            if(n.trim()) Actions.addSkill(n);
          });
        }
        document.querySelectorAll('.btn-train-sk').forEach(b => {
          b.addEventListener('click', () => Actions.trainSkill(b.getAttribute('data-id')));
        });
        document.querySelectorAll('.btn-del-sk').forEach(b => {
          b.addEventListener('click', () => Actions.deleteSkill(b.getAttribute('data-id')));
        });

        document.querySelectorAll('.btn-buy').forEach(b => {
          b.addEventListener('click', () => {
            Actions.buyReward(parseInt(b.getAttribute('data-price')), b.getAttribute('data-name'), b.getAttribute('data-icon'));
          });
        });
      }
    };

    // --- 9. RUNTIME INITIALIZATION ---
    UI.initClock();
    UI.renderSetup();
    UI.renderApp();
  </script>
</body>
</html>
