<style>
  :root{
    --bg:#11151b;
    --bg-2:#161c24;
    --card:#1c232c;
    --card-hover:#212a34;
    --border:#2a3340;
    --text:#e9edf3;
    --text-dim:#8d99a8;
    --text-dimmer:#5f6b7a;
    --accent:#e3ac67;
    --accent-soft:#e3ac6722;
    --teal:#57c3ab;
    --teal-soft:#57c3ab22;
    --good:#5fb686;
    --good-soft:#5fb68622;
    --bad:#d9695e;
    --bad-soft:#d9695e22;
    --radius:16px;
    --radius-sm:10px;
    --shadow: 0 8px 28px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{ height:100%; }
  body{
    background: radial-gradient(1200px 800px at 85% -10%, #1a2028 0%, var(--bg) 45%) fixed;
    color:var(--text);
    font-family:'Tajawal',sans-serif;
    min-height:100vh;
    min-height:100dvh;
    padding-bottom:calc(60px + env(safe-area-inset-bottom));
    padding-top:env(safe-area-inset-top);
    -webkit-tap-highlight-color:transparent;
    overscroll-behavior-y:none;
  }
  h1,h2,h3,.display{font-family:'Cairo',sans-serif;}
  ::selection{background:var(--accent-soft);}
  .wrap{max-width:640px;margin:0 auto;padding:18px 16px 40px;padding-left:max(16px, env(safe-area-inset-left));padding-right:max(16px, env(safe-area-inset-right));}

  /* header */
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:10px;}
  .date-block .greeting{color:var(--text-dim);font-size:13px;margin-bottom:2px;}
  .date-block .day{font-family:'Cairo',sans-serif;font-weight:800;font-size:22px;}
  .date-block .full-date{color:var(--text-dim);font-size:12.5px;margin-top:2px;}
  .stats-pill{display:flex;align-items:center;gap:10px;}
  .pill{background:var(--card);border:1px solid var(--border);border-radius:999px;padding:8px 14px;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;box-shadow:var(--shadow);}
  .pill .num{font-family:'Cairo',sans-serif;color:var(--accent);}
  .pill.points .num{color:var(--accent);}
  .pill.streak .num{color:var(--teal);}

  /* plant */
  .plant-card{background:linear-gradient(180deg,var(--card),var(--bg-2));border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:16px;box-shadow:var(--shadow);}
  .plant-svg{flex:0 0 auto;width:64px;height:64px;}
  .plant-info{flex:1;}
  .plant-info .label{font-size:12.5px;color:var(--text-dim);margin-bottom:3px;}
  .plant-info .level-name{font-family:'Cairo',sans-serif;font-weight:800;font-size:16px;color:var(--text);}
  .progress-track{margin-top:8px;height:7px;background:var(--bg);border-radius:99px;overflow:hidden;border:1px solid var(--border);}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--accent));border-radius:99px;transition:width .5s ease;}
  .progress-label{font-size:11px;color:var(--text-dimmer);margin-top:5px;}

  /* section headers */
  .sec-head{display:flex;align-items:center;justify-content:space-between;margin:22px 0 10px;}
  .sec-head h2{font-size:15px;margin:0;color:var(--text-dim);font-weight:800;letter-spacing:.3px;}
  .add-btn{background:var(--accent-soft);color:var(--accent);border:1px solid #e3ac6744;border-radius:10px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Tajawal';}
  .add-btn:hover{background:#e3ac6733;}

  /* task card */
  .task{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:9px;display:flex;align-items:center;gap:12px;transition:.25s;position:relative;overflow:hidden;}
  .task.done{background:var(--good-soft);border-color:#5fb68655;}
  .task.missed{background:var(--bad-soft);border-color:#d9695e55;}
  .check-btn{flex:0 0 auto;width:30px;height:30px;border-radius:9px;border:2px solid var(--text-dimmer);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;background:transparent;color:transparent;font-size:16px;}
  .check-btn:hover{border-color:var(--accent);}
  .task.done .check-btn{background:var(--good);border-color:var(--good);color:#0d1a12;}
  .task.missed .check-btn{background:var(--bad);border-color:var(--bad);color:#210c0a;}
  .task-body{flex:1;min-width:0;}
  .task-title{font-size:14.5px;font-weight:700;}
  .task.done .task-title{text-decoration:line-through;text-decoration-color:#5fb68699;opacity:.75;}
  .task.missed .task-title{opacity:.8;}
  .task-tag{font-size:11px;color:var(--text-dimmer);margin-top:2px;}
  .task-msg{font-size:12px;margin-top:5px;line-height:1.6;}
  .task.done .task-msg{color:#8fdcab;}
  .task.missed .task-msg{color:#f0a89f;}
  .task-actions{display:flex;gap:6px;}
  .icon-btn{background:transparent;border:none;color:var(--text-dimmer);cursor:pointer;font-size:14px;padding:4px;}
  .icon-btn:hover{color:var(--text);}
  .x-btn{flex:0 0 auto;width:30px;height:30px;border-radius:9px;border:2px solid var(--text-dimmer);display:flex;align-items:center;justify-content:center;cursor:pointer;background:transparent;color:var(--text-dimmer);font-size:14px;}
  .x-btn:hover{border-color:var(--bad);color:var(--bad);}
  .task.missed .x-btn{background:var(--bad);border-color:var(--bad);color:#210c0a;}

  .empty{text-align:center;color:var(--text-dimmer);font-size:13.5px;padding:26px 10px;border:1.5px dashed var(--border);border-radius:var(--radius);}

  /* form */
  .form-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
  .form-row{display:flex;gap:8px;margin-bottom:10px;}
  input[type=text]{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--text);font-family:'Tajawal';font-size:14px;}
  input[type=text]:focus{outline:none;border-color:var(--accent);}
  .seg{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .seg button{flex:1;padding:9px 10px;background:transparent;border:none;color:var(--text-dim);font-family:'Tajawal';font-size:12.5px;font-weight:700;cursor:pointer;}
  .seg button.active{background:var(--accent);color:#221607;}
  .primary-btn{width:100%;background:var(--accent);color:#221607;border:none;border-radius:10px;padding:11px;font-weight:800;font-size:14px;cursor:pointer;font-family:'Cairo';}
  .primary-btn:hover{filter:brightness(1.08);}
  .ghost-btn{width:100%;background:transparent;color:var(--text-dim);border:1px solid var(--border);border-radius:10px;padding:9px;font-size:13px;cursor:pointer;margin-top:6px;font-family:'Tajawal';}

  /* shop */
  .shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .box-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 10px;text-align:center;cursor:pointer;transition:.2s;}
  .box-card:hover{transform:translateY(-2px);border-color:var(--accent);}
  .box-card.disabled{opacity:.4;cursor:not-allowed;transform:none;}
  .box-emoji{font-size:26px;margin-bottom:6px;}
  .box-name{font-size:12.5px;font-weight:700;}
  .box-cost{font-size:11.5px;color:var(--accent);margin-top:3px;font-weight:700;}

  /* overlays */
  .overlay{position:fixed;inset:0;background:rgba(8,10,13,.86);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal{background:var(--card-hover);border:1px solid var(--border);border-radius:20px;padding:26px 22px;max-width:420px;width:100%;box-shadow:var(--shadow);animation:pop .35s cubic-bezier(.2,1.4,.4,1);max-height:85vh;overflow-y:auto;}
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  .modal h3{margin:0 0 12px;font-size:19px;}
  .modal p{line-height:1.9;font-size:14.5px;color:#dbe2ea;margin:0 0 10px;}
  .modal .tip{background:var(--teal-soft);border:1px solid #57c3ab44;border-radius:12px;padding:10px 12px;font-size:13px;color:#a8ebdb;margin-top:12px;}
  .modal .close-btn{margin-top:18px;}
  .gift-trigger{position:fixed;bottom:0;left:0;right:0;padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom));display:flex;justify-content:center;z-index:50;pointer-events:none;}
  .gift-btn{pointer-events:auto;background:linear-gradient(135deg,var(--accent),#f0c98a);color:#241a08;border:none;border-radius:999px;padding:14px 26px;font-family:'Cairo';font-weight:800;font-size:14.5px;box-shadow:0 10px 30px #e3ac6755;cursor:pointer;display:flex;align-items:center;gap:8px;animation:float 2.4s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .full-gift{text-align:center;}
  .full-gift .emoji{font-size:56px;margin-bottom:6px;animation:wiggle 1.6s ease-in-out infinite;}
  @keyframes wiggle{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}

  .badges-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-top:6px;}
  .badge-chip{flex:0 0 auto;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:6px 10px;font-size:11px;color:var(--text-dim);white-space:nowrap;}
  .badge-chip.reached{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}

  .toast-msg{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--card-hover);border:1px solid var(--border);border-radius:12px;padding:11px 18px;font-size:13px;box-shadow:var(--shadow);z-index:1200;max-width:88%;text-align:center;animation:slideDown .35s ease;}
  @keyframes slideDown{from{opacity:0;transform:translate(-50%,-14px)}to{opacity:1;transform:translate(-50%,0)}}

  .task .primary-btn, .task .ghost-btn{width:auto;}

  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}

  @media(max-width:380px){
    .date-block .day{font-size:19px;}
    .pill{padding:7px 10px;font-size:12px;}
  }
</style>
</head>

<script>
(function(){

/* ================= CONTENT POOLS (Arabic) — combined & rotated so nothing feels repeated across a year ================= */

const DONE_TEMPLATES = [
"أحسنت، خطوة صغيرة اليوم تُبنى منها عادة كبيرة.","تمّت! كذا بالضبط تُبنى الثقة بالنفس، خطوة بخطوة.",
"ما شاء الله، الالتزام يبدأ من لحظات بسيطة مثل هذي.","سجّلتها إنجاز. استمر على نفس الوتيرة.",
"عمل جميل، جسمك وعقلك يشكرونك على هالانضباط.","خطوة أقرب لهدفك، لا تستهين بها.",
"هذا بالضبط معنى الاتساق، أنك تسوّيها حتى لو بسيطة.","أنجزتها، وهذا يستاهل تقدير من نفسك لنفسك.",
"واضح إنك جاد هالمرة، استمر بنفس الحماس.","كل مهمة تخلّصها تقربك خطوة من النسخة اللي تبيها من نفسك.",
"تمام، الانضباط مو مزاج، وأنت اليوم أثبتّ ذا.","عاشت، خطوة ثابتة تضاف لرصيدك.",
"إنجاز يستحق التسجيل، افتخر فيه شوي.","استمرارك اليوم هو اللي يصنع الفرق بعد أسابيع.",
"تم بنجاح، وهذا يعني إنك أقوى من الكسل اليوم.","خطوة صغيرة، لكنها لبنة أساسية.",
"أحسنت الاختيار، اخترت تسويها بدل ما تأجلها.","كذا يوم بيوم تتحول العادة لجزء منك.",
"إنجاز نظيف، واضح تعرف شنو تبي.","استمر، النتائج تظهر لما تتكرر مثل هذي اللحظات.",
"ما قصّرت، وهذا يكفي عشان تفتخر.","حركة بسيطة اليوم، لكن أثرها يتراكم.",
"تمّت المهمة، وربحت ثقة أكبر بنفسك.","جميل، كذا تكسب يومك بدل ما يكسبك.",
"مبروك الإنجاز الصغير، هو اللي يصنع الكبير لاحقًا.","استمريتك اليوم شاهد إنك ملتزم فعلاً.",
"أحسنت، خطوة ثابتة نحو نسخة أفضل منك.","انتهيت منها، وهذا بحد ذاته انتصار على التأجيل.",
"واضح إنك تحترم وقتك، استمر كذا.","تمام تمام، خطوة تستاهل تصفيق بسيط لنفسك."
];

const DONE_FILLERS = [
"استمر بنفس الروح 🌿","خطوة بخطوة توصل 🌱","الاتساق أهم من الكمال ✨","فخور فيك الآن 🤍",
"هذا هو الطريق الصحيح 🛤️","بسيط بس فعّال 💪","استمرارك يبني مستقبلك 🌤️","لا تقلل من قيمة اليوم ⭐",
"أنت أقرب مما تتخيل 🎯","الثبات يصنع المعجزات ببطء ⏳","كل يوم لبنة جديدة 🧱","هذا بالضبط الانضباط المطلوب 🔥",
"استمتع باللحظة، تستاهلها 🍃","صغيرة اليوم، عظيمة بعد سنة 🌳","ثقتك بنفسك تكبر الآن 🌟"
];

const MISS_TEMPLATES = [
"ما صار اليوم، ولا بأس، بكرة فرصة جديدة تعوّض فيها.","فاتتك هالمرة، المهم ما تخليها تتكرر بكرة.",
"لا تحمّل نفسك أكثر من طاقتها، بس رجّعها بكرة على رأس أولوياتك.","يصير، كل واحد يفوّت يوم أحيانًا، المهم ترجع بسرعة.",
"تراك ما فشلت، بس أجّلت. رجّعها بكرة بقوة أكبر.","خلّها درس بسيط: التزم أكثر بالوقت اللي حددته لها.",
"ولا يهمك، اللي يهم إنك ما تستسلم عن الهدف كله.","يوم واحد فايت ما يلغي كل جهدك السابق، كمّل من وين وقفت.",
"لاحظ وش صرفك عنها، وحاول تتفاداه المرة الجاية.","خطوة للخلف مو نهاية الطريق، رجّعها بكرة أول شي.",
"ما تحاسب نفسك بقسوة، بس خلّها تذكير إنك تحتاج تنظّم وقتك أكثر.","بكرة يوم جديد، وفرصة تثبت لنفسك إنك جاد.",
"هالمهمة تستاهل تكون أول شي تسويه بكرة.","لا تخليها تتكوم، رجّعها بكرة قبل لا تصير عادة تفويت.",

/* ================= STORAGE HELPERS ================= */
// Prefer Claude's window.storage (works inside the Claude preview).
// If it's not available (e.g. the file was downloaded and opened directly
// in a browser), fall back to localStorage so data still persists
// between visits instead of resetting every time.
const hasClaudeStorage = typeof window.storage !== 'undefined' && window.storage;
async function sGet(key){
  if(hasClaudeStorage){
    try{ const r = await window.storage.get(key,false); return r? JSON.parse(r.value): null; }
    catch(e){ /* fall through to localStorage */ }
  }
  try{ const raw = localStorage.getItem('dailyapp:'+key); return raw? JSON.parse(raw): null; }
  catch(e){ return null; }
}
async function sSet(key,val){
  if(hasClaudeStorage){
    try{ await window.storage.set(key, JSON.stringify(val), false); return; }
    catch(e){ /* fall through to localStorage */ }
  }
  try{ localStorage.setItem('dailyapp:'+key, JSON.stringify(val)); }
  catch(e){ /* ignore */ }
}

function todayStr(d=new Date()){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtFullDate(d=new Date()){
  return `${d.getDate()} ${AR_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

/* rotating unique-picker: cycles through a shuffled order before repeating */
async function pickRotating(poolKey, poolLength){
  let ptrs = await sGet('rot:'+poolKey);
  if(!ptrs || !ptrs.order || ptrs.order.length!==poolLength){
    ptrs = {order: shuffle([...Array(poolLength).keys()]), pos:0};
  }
  const idx = ptrs.order[ptrs.pos];
  ptrs.pos++;
  if(ptrs.pos>=ptrs.order.length){ ptrs.order = shuffle([...Array(poolLength).keys()]); ptrs.pos=0; }
  await sSet('rot:'+poolKey, ptrs);
  return idx;
}

async function buildMessage(kind, opts={}){
  if(kind==='done'){
    const t = DONE_TEMPLATES[await pickRotating('doneT', DONE_TEMPLATES.length)];
    const f = DONE_FILLERS[await pickRotating('doneF', DONE_FILLERS.length)];
    return `${t} ${f}`;
  }
  if(kind==='miss'){
    const t = MISS_TEMPLATES[await pickRotating('missT', MISS_TEMPLATES.length)];
    const f = MISS_FILLERS[await pickRotating('missF', MISS_FILLERS.length)];
    return `${t} ${f}`;
  }
}
async function buildCelebration(streak, pointsToday){
  const o = CELEBRATE_OPENERS[await pickRotating('celO', CELEBRATE_OPENERS.length)];
  const b = CELEBRATE_BODY[await pickRotating('celB', CELEBRATE_BODY.length)];
  const s = CELEBRATE_SUGGESTIONS[await pickRotating('celS', CELEBRATE_SUGGESTIONS.length)];
  return {
    title: o,
    body: `${b}\n\nرصيدك الآن: ${pointsToday} نقطة، وسلسلة أيامك المتتالية: ${streak} يوم.`,
    tip: s
  };
}
async function buildReward(boxName){
  const o = REWARD_OPENERS[await pickRotating('rwO', REWARD_OPENERS.length)];
  const q = REWARD_QUOTES[await pickRotating('rwQ', REWARD_QUOTES.length)];
  const tip = REWARD_TIPS[await pickRotating('rwTip', REWARD_TIPS.length)];
  return {opener:o, quote:q, tip:tip};
}

async function buildGoalMessage(kind){
  if(kind==='win'){
    const t = GOAL_WIN_TEMPLATES[await pickRotating('goalWinT', GOAL_WIN_TEMPLATES.length)];
    const f = GOAL_WIN_FILLERS[await pickRotating('goalWinF', GOAL_WIN_FILLERS.length)];
    return `${t} ${f}`;
  } else {
    const t = GOAL_LOSE_TEMPLATES[await pickRotating('goalLoseT', GOAL_LOSE_TEMPLATES.length)];
    const f = GOAL_LOSE_FILLERS[await pickRotating('goalLoseF', GOAL_LOSE_FILLERS.length)];
    return `${t} ${f}`;
  }
}

function computeDeadline(type, fromStr){
  const d = fromStr? new Date(fromStr) : new Date();
  if(type==='weekly') d.setDate(d.getDate()+7);
  else if(type==='monthly') d.setMonth(d.getMonth()+1);
  else if(type==='yearly') d.setFullYear(d.getFullYear()+1);
  return todayStr(d);
}

/* ================= APP STATE ================= */
let STATE = {
  tasks: [],       // {id,title,type:'routine'|'once', date(once only), createdAt}
  goals: [],       // {id,text,type,createdDate,deadline,status:'pending'|'done'|'failed'}
  stats: {points:0, streakCurrent:0, streakLongest:0, lastActiveDate:null, lastFullDay:null},
  day: null,       // record for today {date, statuses:{}, celebrationShown:bool}
  ui: {showAddForm:false, addType:'routine', showAddGoal:false, goalType:'weekly', showCelebration:null, showReward:null, toast:null}
};

async function loadAll(){
  STATE.tasks = (await sGet('tasks')) || [];
  STATE.goals = (await sGet('goals')) || [];
  STATE.stats = (await sGet('stats')) || {points:0, streakCurrent:0, streakLongest:0, lastActiveDate:null, lastFullDay:null};
  await ensureTodayRecord();
}

function tasksForDate(dateStr){
  return STATE.tasks.filter(t=> t.type==='routine' || t.date===dateStr);
}

async function ensureTodayRecord(){
  const t = todayStr();
  let rec = await sGet('day:'+t);
  if(!rec){
    rec = {date:t, statuses:{}, celebrationShown:false};
  }
  // process missed previous day if we skipped a day (streak break handled here)
  if(STATE.stats.lastActiveDate && STATE.stats.lastActiveDate !== t){
    const last = STATE.stats.lastActiveDate;
    const lastRec = await sGet('day:'+last);
    if(lastRec){
      const lastTasks = tasksForDate(last);
      const allDone = lastTasks.length>0 && lastTasks.every(tk=>lastRec.statuses[tk.id]==='done');
      if(!allDone){
        STATE.stats.streakCurrent = 0;
      }
      // auto-mark any still-pending tasks from that day as missed
      let changed=false;
      lastTasks.forEach(tk=>{
        if(!lastRec.statuses[tk.id]){ lastRec.statuses[tk.id]='missed'; changed=true; }
      });
      if(changed) await sSet('day:'+last, lastRec);
    }
    // if a full day gap (more than 1 calendar day) also reset streak
    const diffDays = Math.round((new Date(t) - new Date(last))/86400000);
    if(diffDays>1){ STATE.stats.streakCurrent = 0; }
  }
  STATE.stats.lastActiveDate = t;
  await sSet('stats', STATE.stats);
  STATE.day = rec;
  await sSet('day:'+t, rec);
}

function currentLevel(){
  let lvl = LEVELS[0], idx=0;
  for(let i=0;i<LEVELS.length;i++){ if(STATE.stats.points>=LEVELS[i].min){ lvl=LEVELS[i]; idx=i; } }
  const next = LEVELS[idx+1];
  return {lvl, next, idx};
}

async function toggleTask(taskId){
  const t = todayStr();
  const rec = STATE.day;
  const cur = rec.statuses[taskId];
  if(cur==='done'){
    rec.statuses[taskId] = undefined;
    delete rec.statuses[taskId];
    STATE.stats.points = Math.max(0, STATE.stats.points-10);
    delete rec._msgs?.[taskId];
  } else if(cur==='missed'){
    rec.statuses[taskId]='done';
    STATE.stats.points += 10;
    const msg = await buildMessage('done');
    rec._msgs = rec._msgs||{}; rec._msgs[taskId]=msg;
  } else {
    rec.statuses[taskId]='done';
    STATE.stats.points += 10;
    const msg = await buildMessage('done');
    rec._msgs = rec._msgs||{}; rec._msgs[taskId]=msg;
  }
  await sSet('day:'+t, rec);
  await sSet('stats', STATE.stats);
  await checkFullDay();
  render();
}

async function markMissed(taskId){
  const t = todayStr();
  const rec = STATE.day;
  const cur = rec.statuses[taskId];
  if(cur==='missed'){
    delete rec.statuses[taskId];
  } else {
    if(cur==='done'){ STATE.stats.points = Math.max(0, STATE.stats.points-10); }
    rec.statuses[taskId]='missed';
    const msg = await buildMessage('miss');
    rec._msgs = rec._msgs||{}; rec._msgs[taskId]=msg;
  }
  await sSet('day:'+t, rec);
  await sSet('stats', STATE.stats);
  render();
}

async function checkFullDay(){
  const t = todayStr();
  const rec = STATE.day;
  const list = tasksForDate(t);
  if(list.length>0 && list.every(tk=>rec.statuses[tk.id]==='done') && !rec.celebrationShown){
    STATE.stats.points += 50;
    STATE.stats.streakCurrent += 1;
    STATE.stats.streakLongest = Math.max(STATE.stats.streakLongest, STATE.stats.streakCurrent);
    rec.celebrationShown = true;
    await sSet('day:'+t, rec);
    await sSet('stats', STATE.stats);
    const cel = await buildCelebration(STATE.stats.streakCurrent, STATE.stats.points);
    STATE.ui.showCelebration = cel;
  }
}

async function addTask(title, type){
  if(!title.trim()) return;
  const task = {id:uid(), title:title.trim(), type, date: type==='once'? todayStr(): null, createdAt: Date.now()};
  STATE.tasks.push(task);
  await sSet('tasks', STATE.tasks);
  STATE.ui.showAddForm=false;
  render();
}
async function deleteTask(id){
  STATE.tasks = STATE.tasks.filter(t=>t.id!==id);
  await sSet('tasks', STATE.tasks);
  render();
}

async function addGoal(text, type){
  if(!text.trim()) return;
  const g = {id:uid(), text:text.trim(), type, createdDate:todayStr(), deadline:computeDeadline(type), status:'pending'};
  STATE.goals.push(g);
  await sSet('goals', STATE.goals);
  STATE.ui.showAddGoal=false;
  render();
}

function isGoalDue(g){
  return g.status==='pending' && todayStr() >= g.deadline;
}

async function reviewGoal(id, achieved){
  const g = STATE.goals.find(x=>x.id===id);
  if(!g) return;
  if(achieved){
    g.status='done';
    STATE.stats.points += GOAL_TYPES[g.type].bonus;
    await sSet('stats', STATE.stats);
    const msg = await buildGoalMessage('win');
    STATE.ui.showCelebration = {title:'🎉 حققت هدفك!', body:msg, tip:`ربحت ${GOAL_TYPES[g.type].bonus} نقطة إضافية 🎯`};
  } else {
    g.status='failed';
    g.resultMsg = await buildGoalMessage('lose');
  }
  await sSet('goals', STATE.goals);
  render();
}

async function renewGoal(id){
  const g = STATE.goals.find(x=>x.id===id);
  if(!g) return;
  STATE.goals = STATE.goals.filter(x=>x.id!==id);
  const ng = {id:uid(), text:g.text, type:g.type, createdDate:todayStr(), deadline:computeDeadline(g.type), status:'pending'};
  STATE.goals.push(ng);
  await sSet('goals', STATE.goals);
  render();
}

async function deleteGoal(id){
  STATE.goals = STATE.goals.filter(x=>x.id!==id);
  await sSet('goals', STATE.goals);
  render();
}

async function buyBox(box){
  if(STATE.stats.points < box.cost){
    STATE.ui.toast = "نقاطك غير كافية بعد لهذا الصندوق";
    render();
    setTimeout(()=>{STATE.ui.toast=null; render();}, 2200);
    return;
  }
  STATE.stats.points -= box.cost;
  await sSet('stats', STATE.stats);
  const reward = await buildReward(box.name);
  STATE.ui.showReward = reward;
  render();
}

/* ================= RENDER ================= */
const app = document.getElementById('app');

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function plantSvg(streak){
  const leaves = Math.min(6, Math.floor(streak/2));
  let leafPaths = '';
  const positions = [[32,40,-20],[32,32,20],[32,24,-15],[32,16,15],[32,10,-10],[32,4,10]];
  for(let i=0;i<leaves;i++){
    const [x,y,rot] = positions[i];
    leafPaths += `<ellipse cx="${x}" cy="${y}" rx="7" ry="4" fill="#57c3ab" transform="rotate(${rot} ${x} ${y})" opacity="${0.55+i*0.07}"/>`;
  }
  const flower = streak>=12 ? `<circle cx="32" cy="6" r="4" fill="#e3ac67"/>` : '';
  return `<svg class="plant-svg" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
    <rect x="14" y="46" width="36" height="10" rx="3" fill="#2a3340"/>
    <path d="M32 46 L32 12" stroke="#57c3ab" stroke-width="3" stroke-linecap="round"/>
    ${leafPaths}${flower}
  </svg>`;
}

function render(){
  const t = todayStr();
  const now = new Date();
  const dayName = AR_DAYS[now.getDay()];
  const list = tasksForDate(t);
  const rec = STATE.day;
  const {lvl, next} = currentLevel();
  const progressPct = next? Math.min(100, Math.round(((STATE.stats.points-lvl.min)/(next.min-lvl.min))*100)) : 100;

  const doneCount = list.filter(tk=>rec.statuses[tk.id]==='done').length;

  let html = '';

  html += `<div class="top">
    <div class="date-block">
      <div class="greeting">أهلاً بك 👋</div>
      <div class="day">يوم ${dayName}</div>
      <div class="full-date">${fmtFullDate(now)}</div>
    </div>
    <div class="stats-pill">
      <div class="pill streak">🔥 <span class="num">${STATE.stats.streakCurrent}</span></div>
      <div class="pill points">⭐ <span class="num">${STATE.stats.points}</span></div>
    </div>
  </div>`;

  html += `<div class="plant-card">
    ${plantSvg(STATE.stats.streakCurrent)}
    <div class="plant-info">
      <div class="label">مستواك الحالي</div>
      <div class="level-name">${lvl.name}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${progressPct}%"></div></div>
      <div class="progress-label">${next? `${STATE.stats.points} / ${next.min} نقطة للمستوى الجاي` : 'وصلت لأعلى مستوى 🎉'}</div>
    </div>
  </div>`;

  html += `<div class="sec-head"><h2>مهام اليوم (${doneCount}/${list.length||0})</h2>
    <button class="add-btn" onclick="UI.toggleAdd()">+ إضافة مهمة</button></div>`;

  if(STATE.ui.showAddForm){
    html += `<div class="form-card">
      <div class="form-row">
        <input type="text" id="newTaskInput" placeholder="اكتب المهمة هنا..." />
      </div>
      <div class="form-row">
        <div class="seg">
          <button class="${STATE.ui.addType==='routine'?'active':''}" onclick="UI.setAddType('routine')">روتين يومي ثابت</button>
          <button class="${STATE.ui.addType==='once'?'active':''}" onclick="UI.setAddType('once')">لهذا اليوم فقط</button>
        </div>
      </div>
      <button class="primary-btn" onclick="UI.submitAdd()">إضافة</button>
      <button class="ghost-btn" onclick="UI.toggleAdd()">إلغاء</button>
    </div>`;
  }

  if(list.length===0){
    html += `<div class="empty">ما عندك مهام اليوم بعد 🌱<br>اضغط "إضافة مهمة" وابدأ يومك.</div>`;
  } else {
    list.forEach(tk=>{
      const status = rec.statuses[tk.id];
      const cls = status==='done'?'done': status==='missed'?'missed':'';
      const msg = rec._msgs && rec._msgs[tk.id];
      html += `<div class="task ${cls}">
        <div class="check-btn" onclick="UI.toggle('${tk.id}')">${status==='done'?'✓':''}</div>
        <div class="task-body">
          <div class="task-title">${escapeHtml(tk.title)}</div>
          <div class="task-tag">${tk.type==='routine'?'روتين يومي':'مهمة اليوم'}</div>
          ${msg? `<div class="task-msg">${escapeHtml(msg)}</div>`:''}
        </div>
        <div class="task-actions">
          <div class="x-btn" onclick="UI.miss('${tk.id}')">✕</div>
          <button class="icon-btn" onclick="UI.remove('${tk.id}')">🗑</button>
        </div>
      </div>`;
    });
  }

  html += `<div class="sec-head"><h2>أهدافي 🎯</h2>
    <button class="add-btn" onclick="UI.toggleAddGoal()">+ هدف جديد</button></div>`;

  if(STATE.ui.showAddGoal){
    html += `<div class="form-card">
      <div class="form-row">
        <input type="text" id="newGoalInput" placeholder="اكتب هدفك هنا..." />
      </div>
      <div class="form-row">
        <div class="seg">
          <button class="${STATE.ui.goalType==='weekly'?'active':''}" onclick="UI.setGoalType('weekly')">أسبوعي</button>
          <button class="${STATE.ui.goalType==='monthly'?'active':''}" onclick="UI.setGoalType('monthly')">شهري</button>
          <button class="${STATE.ui.goalType==='yearly'?'active':''}" onclick="UI.setGoalType('yearly')">سنوي</button>
        </div>
      </div>
      <button class="primary-btn" onclick="UI.submitGoal()">إضافة الهدف</button>
      <button class="ghost-btn" onclick="UI.toggleAddGoal()">إلغاء</button>
    </div>`;
  }

  if(STATE.goals.length===0){
    html += `<div class="empty">ما عندك أهداف بعد 🎯<br>حط هدف أسبوعي أو شهري أو سنوي وارجع له بوقته.</div>`;
  } else {
    STATE.goals.slice().reverse().forEach(g=>{
      const due = isGoalDue(g);
      const daysLeft = Math.ceil((new Date(g.deadline)-new Date(todayStr()))/86400000);
      let statusHtml='';
      if(g.status==='pending' && !due){
        statusHtml = `<div class="task-tag">⏳ متبقي ${daysLeft} يوم — يستحق ${fmtFullDate(new Date(g.deadline))}</div>`;
      } else if(g.status==='pending' && due){
        statusHtml = `<div class="task-tag" style="color:var(--accent)">🎯 وصل وقت هدفك! هل حققته؟</div>
          <div class="task-actions" style="margin-top:8px;">
            <button class="primary-btn" style="width:auto;padding:8px 14px;" onclick="UI.reviewGoal('${g.id}',true)">✅ أنجزته</button>
            <button class="ghost-btn" style="width:auto;padding:8px 14px;margin-top:0;" onclick="UI.reviewGoal('${g.id}',false)">❌ لم أكمله</button>
          </div>`;
      } else if(g.status==='done'){
        statusHtml = `<div class="task-msg" style="color:#8fdcab;">✅ تم الإنجاز — ربحت ${GOAL_TYPES[g.type].bonus} نقطة 🎉</div>`;
      } else if(g.status==='failed'){
        statusHtml = `<div class="task-msg" style="color:#f0a89f;">${escapeHtml(g.resultMsg||'')}</div>
          <button class="ghost-btn" onclick="UI.renewGoal('${g.id}')">🔄 تجديد الهدف</button>`;
      }
      const cls = g.status==='done'?'done':g.status==='failed'?'missed':'';
      html += `<div class="task ${cls}" style="align-items:flex-start;flex-direction:column;gap:6px;">
        <div style="display:flex;width:100%;align-items:center;gap:10px;">
          <div style="flex:1;">
            <div class="task-title">${escapeHtml(g.text)}</div>
            <div class="task-tag">هدف ${GOAL_TYPES[g.type].label}</div>
          </div>
          <button class="icon-btn" onclick="UI.removeGoal('${g.id}')">🗑</button>
        </div>
        ${statusHtml}
      </div>`;
    });
  }

  html += `<div class="sec-head"><h2>متجر المفاجآت 🎁</h2></div>
  <div class="shop-grid">`;
  SHOP_BOXES.forEach(b=>{
    const disabled = STATE.stats.points < b.cost;
    html += `<div class="box-card ${disabled?'disabled':''}" onclick="${disabled?'':`UI.buy('${b.id}')`}">
      <div class="box-emoji">${b.emoji}</div>
      <div class="box-name">${b.name}</div>
      <div class="box-cost">${b.cost} نقطة</div>
    </div>`;
  });
  html += `</div>`;

  html += `<div class="sec-head"><h2>المستويات</h2></div>
  <div class="badges-strip">`;
  LEVELS.forEach(l=>{
    html += `<div class="badge-chip ${STATE.stats.points>=l.min?'reached':''}">${l.name}</div>`;
  });
  html += `</div>`;

  app.innerHTML = html;

  const inp = document.getElementById('newTaskInput');
  if(inp){ inp.focus(); inp.addEventListener('keydown', e=>{ if(e.key==='Enter') UI.submitAdd(); }); }
  const ginp = document.getElementById('newGoalInput');
  if(ginp){ ginp.focus(); ginp.addEventListener('keydown', e=>{ if(e.key==='Enter') UI.submitGoal(); }); }

  // celebration overlay
  const overlayHost = document.getElementById('overlayHost');
  if(overlayHost) overlayHost.remove();
  if(STATE.ui.showCelebration){
    const c = STATE.ui.showCelebration;
    const div = document.createElement('div');
    div.id='overlayHost';
    div.className='overlay';
    div.innerHTML = `<div class="modal full-gift">
      <div class="emoji">🎉</div>
      <h3>${escapeHtml(c.title)}</h3>
      <p style="white-space:pre-line">${escapeHtml(c.body)}</p>
      <div class="tip">💡 ${escapeHtml(c.tip)}</div>
      <button class="primary-btn close-btn" onclick="UI.closeCelebration()">شكرًا 🤍</button>
    </div>`;
    document.body.appendChild(div);
  } else if(STATE.ui.showReward){
    const r = STATE.ui.showReward;
    const div = document.createElement('div');
    div.id='overlayHost';
    div.className='overlay';
    div.innerHTML = `<div class="modal">
      <h3>${escapeHtml(r.opener)}</h3>
      <p>"${escapeHtml(r.quote)}"</p>
      <div class="tip">💡 ${escapeHtml(r.tip)}</div>
      <button class="primary-btn close-btn" onclick="UI.closeReward()">إغلاق</button>
    </div>`;
    document.body.appendChild(div);
  }

  const toastHost = document.getElementById('toastHost');
  if(toastHost) toastHost.remove();
  if(STATE.ui.toast){
    const d = document.createElement('div');
    d.id='toastHost'; d.className='toast-msg'; d.textContent=STATE.ui.toast;
    document.body.appendChild(d);
  }
}

/* ================= UI HANDLERS ================= */
window.UI = {
  toggleAdd(){ STATE.ui.showAddForm = !STATE.ui.showAddForm; render(); },
  setAddType(v){ STATE.ui.addType=v; render(); },
  async submitAdd(){
    const inp = document.getElementById('newTaskInput');
    const val = inp? inp.value : '';
    await addTask(val, STATE.ui.addType);
  },
  toggle(id){ toggleTask(id); },
  miss(id){ markMissed(id); },
  remove(id){ deleteTask(id); },
  buy(id){ const box = SHOP_BOXES.find(b=>b.id===id); buyBox(box); },
  closeCelebration(){ STATE.ui.showCelebration=null; render(); },
  closeReward(){ STATE.ui.showReward=null; render(); },
  toggleAddGoal(){ STATE.ui.showAddGoal = !STATE.ui.showAddGoal; render(); },
  setGoalType(v){ STATE.ui.goalType=v; render(); },
  async submitGoal(){
    const inp = document.getElementById('newGoalInput');
    const val = inp? inp.value : '';
    await addGoal(val, STATE.ui.goalType);
  },
  reviewGoal(id, achieved){ reviewGoal(id, achieved); },
  renewGoal(id){ renewGoal(id); },
  removeGoal(id){ deleteGoal(id); }
};

/* ================= INIT ================= */
(async function init(){
  app.innerHTML = `<div class="empty" style="margin-top:60px;">جارِ التحميل...</div>`;
  await loadAll();
  render();
})();

})();
</script>
