<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>إنجاز — غير متصل</title>
<meta name="theme-color" content="#0b3d2e">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background: radial-gradient(1200px 800px at 85% -10%, #123d2f 0%, #0b3d2e 45%, #082e23 100%);
    color:#e9edf3;
    font-family:-apple-system, 'Tajawal', 'Cairo', sans-serif;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 24px;
    padding-top: max(24px, env(safe-area-inset-top));
    padding-bottom: max(24px, env(safe-area-inset-bottom));
  }
  .box{max-width:360px;}
  .mark{
    width:96px;height:96px;border-radius:22px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(227,172,103,0.25);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 22px;
    font-size:40px;font-weight:800;color:#fff;
  }
  h1{font-size:22px;margin:0 0 10px;}
  p{font-size:14.5px;line-height:1.9;color:#b9c3ce;margin:0 0 22px;}
  button{
    background:linear-gradient(135deg,#e3ac67,#f0c98a);
    color:#241a08;border:none;border-radius:12px;
    padding:12px 26px;font-weight:800;font-size:14.5px;
    cursor:pointer;font-family:inherit;
  }
  .dim{color:#5f6b7a;font-size:12px;margin-top:18px;}
</style>
</head>
<body>
  <div class="box">
    <div class="mark">إ</div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>يبدو إنك غير متصل الآن. بيانات إنجاز محفوظة على جهازك، جرّب فتح التطبيق من جديد بعد رجوع الاتصال.</p>
    <button onclick="location.href='./index.html'">إعادة المحاولة</button>
    <div class="dim">إنجاز · يعمل حتى بدون إنترنت لما يفتح مرة أول</div>
  </div>
</body>
</html>
